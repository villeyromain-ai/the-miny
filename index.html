<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>the miny - OMEGA v22.16</title>
<style>
  body { margin: 0; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; cursor: none; user-select: none; touch-action: none; font-family: 'SF Pro Display', 'Helvetica Neue', sans-serif; }
  #instruction { position: absolute; bottom: 60px; color: rgba(255,255,255,0.5); font-weight: 200; font-size: 11px; letter-spacing: 4px; opacity: 0; transition: all 1s; text-align: center; width: 100%; pointer-events: none; text-transform: uppercase; z-index: 100; }
  #flux-ui { position: absolute; top: 40px; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 50; opacity: 0; transition: opacity 1s; }
  #input-flux { background: transparent; border: none; border-bottom: 1px solid #222; color: #fff; text-align: center; font-size: 1.2rem; outline: none; width: 240px; letter-spacing: 6px; padding: 10px 0; text-transform: uppercase; font-weight: 100; }
</style>
</head>
<body>
<div id="flux-ui">
   <input type="text" id="input-flux" placeholder="INTERÊT" autocomplete="off">
</div>
<div id="instruction"></div>
<canvas id="minyCanvas"></canvas>

<script>
const canvas = document.getElementById("minyCanvas");
const ctx = canvas.getContext("2d");
const instruction = document.getElementById("instruction");
const fluxUI = document.getElementById("flux-ui");
const inputFlux = document.getElementById("input-flux");

let width, height, ratio;
let state = "START_M", currentCore = "m";
let progress = 0, pressTimer = 0, isPressing = false;
let yOffset = 0, isInitiated = false, collisionData = null;

const menus = {
  "m": { electrons: ["n", "y", "i"], angles: [-Math.PI/2, Math.PI/6, 5*Math.PI/6] },
  "i": { electrons: ["e", "e", "e"], angles: [-Math.PI/2, Math.PI/6, 5*Math.PI/6] },
  "y": { electrons: ["e", "e", "e"], angles: [-Math.PI/2, Math.PI/6, 5*Math.PI/6] }
};

function resize() {
  ratio = window.devicePixelRatio || 1;
  width = window.innerWidth; height = window.innerHeight;
  canvas.width = width * ratio; canvas.height = height * ratio;
  canvas.style.width = width + "px"; canvas.style.height = height + "px";
  ctx.scale(ratio, ratio);
}
window.addEventListener("resize", resize); resize();

function updateInstruction(text, delay = 0) {
  setTimeout(() => {
      instruction.style.opacity = 0;
      setTimeout(() => {
          instruction.innerHTML = text;
          instruction.style.opacity = 1;
      }, 500);
  }, delay);
}

// LOGIQUE GPS & COLLISION (Intégration technologique)
function triggerScan(flux) {
   if ("geolocation" in navigator) {
       navigator.geolocation.getCurrentPosition((pos) => {
           const lat = pos.coords.latitude.toFixed(3);
           const lon = pos.coords.longitude.toFixed(3);
           const intensity = Math.floor(Math.random() * 45) + 55;
           collisionData = { flux, intensity, loc: `${lat} / ${lon}` };
           updateInstruction(`${flux} : ${intensity}% résonance à nantes`, 0);
           localStorage.setItem('miny_last_flux', flux);
       });
   }
}

inputFlux.addEventListener("keydown", (e) => {
   if(e.key === "Enter") {
       triggerScan(inputFlux.value);
       inputFlux.blur();
       fluxUI.style.opacity = 0;
   }
});

const onDown = (e) => {
  isPressing = true; pressTimer = 0;
  const t = e.touches ? e.touches[0] : e;
  const mx = t.clientX - width/2, my = t.clientY - height/2;
  const dist = Math.sqrt(mx*mx + my*my);

  if (state === "IDLE" && dist < 45) {
      // Interaction noyau
  }
};

const onUp = () => {
  if (isPressing && pressTimer < 0.3 && state === "IDLE") {
      fluxUI.style.opacity = fluxUI.style.opacity == 1 ? 0 : 1;
  }
  isPressing = false;
};

window.addEventListener("mousedown", onDown); window.addEventListener("mouseup", onUp);
window.addEventListener("touchstart", (e) => { e.preventDefault(); onDown(e); }, {passive: false});
window.addEventListener("touchend", (e) => { e.preventDefault(); onUp(e); }, {passive: false});

function drawAtom(x, y, label, radius, isCore, alpha = 1, pulse = false) {
  ctx.save(); ctx.translate(x, y); ctx.globalAlpha = alpha;
  if (pulse) {
      const p = (Math.sin(Date.now() * 0.004) + 1) / 2;
      const g = ctx.createRadialGradient(0,0,0,0,0,radius*3);
      g.addColorStop(0, "rgba(0, 255, 255, 0.2)"); g.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(0,0,radius*4,0,Math.PI*2); ctx.fill();
  }
  ctx.shadowColor = "rgba(0, 255, 255, 0.5)"; ctx.shadowBlur = 10;
  ctx.strokeStyle = "#FFF"; ctx.lineWidth = 1.5; ctx.fillStyle = "#000";
  ctx.beginPath(); ctx.arc(0, 0, radius, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  ctx.shadowBlur = 0; ctx.fillStyle = "#FFF";
  ctx.font = "200 " + (isCore ? "22px" : "12px") + " Helvetica Neue";
  ctx.textAlign = "center"; ctx.fillText(label === "e" ? "" : label, 0, isCore ? 8 : 4);
  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, width, height);
  ctx.save(); ctx.translate(width / 2, height / 2);
  const time = Date.now() * 0.002;

  if (isPressing && state === "IDLE") {
      pressTimer += 0.016;
      if (pressTimer > 0.3) {
          const arc = Math.min(1, (pressTimer - 0.3) * 2);
          ctx.strokeStyle = "#0FF"; ctx.lineWidth = 2;
          ctx.beginPath(); ctx.arc(0, 0, 55, -Math.PI/2, (-Math.PI/2) + (Math.PI*2*arc)); ctx.stroke();
          if (arc >= 1) { state = "ATOM_SPIN"; progress = 0; isPressing = false; }
      }
  }

  if (state === "START_M") {
      progress += 0.02; drawAtom(0, 0, "m", 38, true, progress);
      if (progress >= 1) { state = "ECLOSION"; progress = 0; }
  } else if (state === "ECLOSION") {
      progress += 0.03; drawAtom(0, 0, "m", 38, true, 1);
      menus.m.electrons.forEach((l, i) => {
          const a = menus.m.angles[i], d = 160 * progress;
          drawAtom(Math.cos(a)*d, Math.sin(a)*d, l, 22, false, progress);
      });
      if (progress >= 1) { state = "IDLE"; updateInstruction("the miny, vos intérêts nous (re)connectent"); }
  } else if (state === "IDLE") {
      const float = Math.sin(time) * 5;
      menus[currentCore].electrons.forEach((l, i) => {
          const a = menus[currentCore].angles[i] + Math.sin(time*0.5+i)*0.1;
          drawAtom(Math.cos(a)*160, Math.sin(a)*160 + float, l, 22, false, 1);
      });
      drawAtom(0, float, currentCore, 38, true, 1, true);
  } else if (state === "ATOM_SPIN") {
      progress += 0.025; const rot = progress * Math.PI * 6;
      ["A", "-", "T", "O", "m"].forEach((c, i) => {
          const d = 160 * (1 - progress);
          drawAtom(Math.cos(rot + (i * 6.28 / 5)) * d, Math.sin(rot + (i * 6.28 / 5)) * d, c, 22, true, 1);
      });
      if (progress >= 1) { state = "ATOM_ALIGN"; progress = 0; }
  } else if (state === "ATOM_ALIGN") {
      progress += 0.03; if (progress > 1) yOffset = Math.min(1, yOffset + 0.05);
      ctx.save(); ctx.translate(0, -(yOffset * 150));
      const chars = ["A", "-", "T", "O", "m"];
      chars.forEach((c, i) => drawAtom((i-2)*80 * Math.min(1, progress*1.5), 0, c, 22, true));
      ctx.restore();
      if (yOffset > 0.8) drawAtom(0, 100, "A-TOm", 40, true, (yOffset-0.8)*5, true);
  }

  ctx.restore(); requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
