<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>the miny - v22.20 Nano</title>
<style>
  body { margin: 0; background: #000; overflow: hidden; height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica; color: #fff; touch-action: none; }
  canvas { display: block; width: 100vw; height: 100vh; }

  #overlay { position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); transition: 0.5s; }
  #status { font-size: 10px; letter-spacing: 5px; color: #0FF; text-align: center; font-weight: 200; }

  #input-area { position: fixed; bottom: 10%; left: 50%; transform: translateX(-50%); z-index: 50; width: 80%; opacity: 0; transition: 0.8s; pointer-events: none; }
  #input-area.visible { opacity: 1; pointer-events: auto; }
  input { background: transparent; border: none; border-bottom: 1px solid #333; color: #fff; width: 100%; text-align: center; font-size: 1.2rem; outline: none; font-weight: 100; letter-spacing: 4px; padding: 10px; }
</style>
</head>
<body>

<div id="overlay" onclick="awake()">
   <div id="status">TOUCHER POUR ÉVEILLER<br>A-TOm</div>
</div>

<div id="input-area">
   <input type="text" id="atom-in" placeholder="FLUX D'INTÉRÊT..." autocomplete="off">
</div>

<canvas id="minyCanvas"></canvas>

<script>
const canvas = document.getElementById("minyCanvas");
const ctx = canvas.getContext("2d");
const overlay = document.getElementById("overlay");
const inputArea = document.getElementById("input-area");
const atomIn = document.getElementById("atom-in");

let width, height, ratio;
let coreSize, orbitDist;
let atoms = [];
let locationStatus = "EN ATTENTE";

function awake() {
   overlay.style.opacity = "0";
   setTimeout(() => overlay.style.display = "none", 500);
   inputArea.classList.add("visible");

   // Force GPS sur interaction iPhone
   navigator.geolocation.getCurrentPosition((pos) => {
       locationStatus = `${pos.coords.latitude.toFixed(2)} / ${pos.coords.longitude.toFixed(2)}`;
   }, () => { locationStatus = "GPS REJETÉ"; });
}

function resize() {
   ratio = window.devicePixelRatio || 1;
   width = window.innerWidth; height = window.innerHeight;
   canvas.width = width * ratio; canvas.height = height * ratio;
   ctx.scale(ratio, ratio);

   // Adaptation dynamique à la taille de l'iPhone
   coreSize = width * 0.12; 
   orbitDist = width * 0.35;
}
window.addEventListener("resize", resize); resize();

atomIn.addEventListener("keydown", (e) => {
   if(e.key === "Enter" && atomIn.value) {
       atoms.push({ 
           label: atomIn.value, 
           ang: Math.random() * 6.28, 
           d: 400, 
           targetD: orbitDist + (Math.random() * 30),
           o: 0 
       });
       atomIn.value = "";
   }
});

function drawAtom(x, y, label, radius, isCore, alpha = 1) {
   ctx.save(); ctx.translate(x, y); ctx.globalAlpha = alpha;

   // Glow subtil
   const p = (Math.sin(Date.now()*0.004)+1)/2;
   const g = ctx.createRadialGradient(0,0,0,0,0,radius*3);
   g.addColorStop(0, "rgba(0, 255, 255, 0.1)"); g.addColorStop(1, "rgba(0,0,0,0)");
   ctx.fillStyle = g; ctx.beginPath(); ctx.arc(0,0,radius*4,0,Math.PI*2); ctx.fill();

   ctx.shadowColor = "rgba(0,255,255,0.4)"; ctx.shadowBlur = 8;
   ctx.strokeStyle = "#fff"; ctx.lineWidth = 1; ctx.fillStyle = "#000";
   ctx.beginPath(); ctx.arc(0,0,radius,0,Math.PI*2); ctx.fill(); ctx.stroke();

   ctx.fillStyle = "#fff";
   ctx.font = `100 ${isCore ? radius*0.5 : radius*0.45}px Helvetica Neue`;
   ctx.textAlign = "center";
   ctx.fillText(label.toUpperCase(), 0, radius*0.18);
   ctx.restore();
}

function draw() {
   ctx.clearRect(0, 0, width, height);
   ctx.save(); ctx.translate(width/2, height/2);
   const time = Date.now() * 0.002;
   const floatY = Math.sin(time) * 4;

   // Noyau central redimensionné
   drawAtom(0, floatY, "M", coreSize, true, 1);

   // Électrons dynamiques (tes intérêts)
   atoms.forEach((a, i) => {
       a.ang += 0.005;
       if(a.d > a.targetD) a.d -= 3;
       if(a.o < 1) a.a += 0.02;
       drawAtom(Math.cos(a.ang)*a.d, Math.sin(a.ang)*a.d + floatY, a.label, coreSize*0.5, false, 0.7);
   });

   // Stats GPS discrètes
   ctx.globalAlpha = 0.3; ctx.fillStyle = "#fff"; ctx.font = "8px Helvetica"; ctx.textAlign = "center";
   ctx.fillText(`NANTES : ${locationStatus}`, 0, height/2 - 30);

   ctx.restore(); requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
