<!DOCTYPE html>
<html lang="fr">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
   <style>
       body { margin:0; background:#000; overflow:hidden; font-family: 'Helvetica Neue', sans-serif; }
       canvas { display:block; touch-action:none; }
       #ui { position:fixed; bottom:40px; width:100%; text-align:center; pointer-events:none; }
       input { pointer-events:auto; background:transparent; border:none; border-bottom:0.5px solid rgba(0,255,255,0.3); color:#fff; text-align:center; letter-spacing:5px; outline:none; padding:10px; width:200px; text-transform:uppercase; font-weight:200; font-size:12px; }
   </style>
</head>
<body>
<canvas id="piano"></canvas>
<div id="ui"><input type="text" id="i-input" placeholder="AJOUTER i"></div>

<script>
/**
* LE RÉACTEUR (Le Châssis 19.5 déporté dans un thread fantôme)
* Ce code s'exécute "ailleurs" pour ne pas perturber le piano.
*/
const reactorCode = `
   self.onmessage = async function(e) {
       if (e.data.type === 'IGNITE') {
           // Calcul de l'entropie nucléaire sans bloquer le visuel
           const data = new Uint8Array(1024);
           self.crypto.getRandomValues(data);
           const key = await self.crypto.subtle.digest('SHA-256', data);
           self.postMessage({ type: 'BOMBE_READY', key: new Uint8Array(key)[0] });
       }
   }
`;

const blob = new Blob([reactorCode], { type: 'application/javascript' });
const Reactor = new Worker(URL.createObjectURL(blob));

/**
* LE PIANO (La Carrosserie 18.4 - Rendu Pur)
*/
const canvas = document.getElementById('piano');
const ctx = canvas.getContext('2d');
let w, h, rotation = 0, lastX = 0, dragging = false, active = false, bootStep = 0;
let electrons = [];

function resize() {
   canvas.width = window.innerWidth * window.devicePixelRatio;
   canvas.height = window.innerHeight * window.devicePixelRatio;
   ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
   w = window.innerWidth; h = window.innerHeight;
}
window.onresize = resize; resize();

// ÉCOUTE DU PONT (A-TOM)
Reactor.onmessage = (e) => {
   if (e.data.type === 'BOMBE_READY') {
       console.log("CHASSIS ALIMENTÉ. DÉMARRAGE PIANO.");
       animate(); 
   }
};

// INTERACTION
canvas.onpointerdown = e => { dragging = true; lastX = e.clientX; };
window.onpointermove = e => { if(dragging) { rotation += (e.clientX - lastX) * 0.01; lastX = e.clientX; }};
window.onpointerup = () => dragging = false;

document.getElementById('i-input').onkeydown = e => {
   if(e.key === 'Enter' && e.target.value) {
       electrons.push({ t: e.target.value.toUpperCase(), a: Math.random()*6.28 - rotation, r: 85, o: 0 });
       e.target.value = '';
       if(navigator.vibrate) navigator.vibrate(15);
   }
};

/**
* LA FRESQUE (Le mouvement)
*/
function animate() {
   ctx.fillStyle = '#000'; ctx.fillRect(0, 0, w, h);
   const cx = w/2, cy = h/2;

   if (!active) {
       // --- BOOT 18.4 : TENSION GÉOMÉTRIQUE ---
       bootStep += 0.015;
       ctx.strokeStyle = '#00FFFF'; ctx.lineWidth = 1.5;
       const pts = [{x:0, y:-60}, {x:-55, y:35}, {x:55, y:35}];
       pts.forEach(p => {
           ctx.beginPath(); ctx.moveTo(cx, cy);
           ctx.lineTo(cx + p.x * Math.min(1, bootStep), cy + p.y * Math.min(1, bootStep));
           ctx.stroke();
       });
       if(bootStep > 1.8) { active = true; if(navigator.vibrate) navigator.vibrate([10, 40]); }
   } else {
       // --- RENDU ATOME RESSERRÉ ---
       ctx.save(); ctx.translate(cx, cy); ctx.rotate(rotation);

       // Noyau m
       ctx.shadowBlur = 15; ctx.shadowColor = 'cyan'; ctx.fillStyle = '#fff';
       ctx.font = '200 30px Helvetica Neue'; ctx.textAlign = 'center';
       ctx.fillText('m', 0, 10 + Math.sin(Date.now()*0.003)*3);

       // Électrons i
       electrons.forEach(el => {
           if(el.o < 1) el.o += 0.05;
           const x = Math.cos(el.a)*el.r, y = Math.sin(el.a)*el.r;
           ctx.fillStyle = `rgba(224, 255, 255, ${el.o*0.4})`;
           ctx.beginPath(); ctx.arc(x, y, 15, 0, 6.28); ctx.fill();
           ctx.fillStyle = `rgba(255,255,255,${el.o})`;
           ctx.beginPath(); ctx.arc(x, y, 1.5, 0, 6.28); ctx.fill();
           ctx.font = '100 8px Helvetica Neue'; ctx.fillStyle = 'cyan';
           ctx.fillText(el.t, x, y + 25);
       });
       ctx.restore();
   }
   requestAnimationFrame(animate);
}

// ALLUMAGE DU RÉACTEUR
Reactor.postMessage({ type: 'IGNITE' });
</script>
</body>
</html>
