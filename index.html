<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>the miny - v22.17 Neural Flow</title>
<style>
  body { margin: 0; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; cursor: none; user-select: none; touch-action: none; font-family: 'SF Pro Display', sans-serif; }
  #instruction { position: absolute; bottom: 50px; color: rgba(255,255,255,0.3); font-weight: 200; font-size: 10px; letter-spacing: 5px; opacity: 0; transition: 1s; text-align: center; width: 100%; text-transform: uppercase; }
  #flux-input { position: absolute; top: 15%; opacity: 0; transition: 0.8s; pointer-events: none; }
  #flux-input.active { opacity: 1; pointer-events: auto; }
  input { background: transparent; border: none; border-bottom: 1px solid #333; color: #fff; text-align: center; font-size: 1.5rem; outline: none; width: 260px; letter-spacing: 8px; font-weight: 100; text-transform: uppercase; }
</style>
</head>
<body>
<div id="flux-input"><input type="text" id="input-field" placeholder="..." autocomplete="off"></div>
<div id="instruction"></div>
<canvas id="minyCanvas"></canvas>

<script>
const canvas = document.getElementById("minyCanvas");
const ctx = canvas.getContext("2d");
const inputField = document.getElementById("input-field");
const fluxInput = document.getElementById("flux-input");

let width, height, ratio;
let state = "IDLE", currentCore = "m";
let progress = 0, pressTimer = 0, isPressing = false;
let atoms = []; // Stockage des électrons dynamiques
let ripple = { x: 0, y: 0, r: 0, a: 0 };

// Configuration initiale des électrons de base
const baseElectrons = [
   { label: "n", angle: -Math.PI/2, dist: 180, type: "nav" },
   { label: "y", angle: Math.PI/6, dist: 180, type: "nav" },
   { label: "i", angle: 5*Math.PI/6, dist: 180, type: "nav" }
];

function resize() {
  ratio = window.devicePixelRatio || 1;
  width = window.innerWidth; height = window.innerHeight;
  canvas.width = width * ratio; canvas.height = height * ratio;
  ctx.scale(ratio, ratio);
}
window.addEventListener("resize", resize); resize();

function triggerRipple(x, y) {
   ripple = { x, y, r: 0, a: 1 };
}

function addSuggestion(label) {
   const angle = Math.random() * Math.PI * 2;
   atoms.push({ label, angle, dist: 300, targetDist: 200, opacity: 0, type: "discovery" });
}

inputField.addEventListener("keydown", (e) => {
   if(e.key === "Enter") {
       const val = inputField.value;
       if(val) {
           triggerRipple(0, 0);
           addSuggestion(val);
           inputField.value = "";
           fluxInput.classList.remove("active");
           document.getElementById("instruction").innerHTML = "flux " + val + " ancré";
       }
   }
});

const onDown = (e) => {
  isPressing = true; pressTimer = 0;
  const t = e.touches ? e.touches[0] : e;
  const mx = t.clientX - width/2, my = t.clientY - height/2;

  // Détection clic sur noyau
  if (Math.sqrt(mx*mx + my*my) < 50) {
      pressTimer = 0.01;
  }
};

const onUp = (e) => {
  if (isPressing && pressTimer < 0.3) {
      fluxInput.classList.toggle("active");
      if(fluxInput.classList.contains("active")) inputField.focus();
  }
  isPressing = false;
};

window.addEventListener("mousedown", onDown); window.addEventListener("mouseup", onUp);
window.addEventListener("touchstart", (e) => { e.preventDefault(); onDown(e); }, {passive: false});
window.addEventListener("touchend", (e) => { e.preventDefault(); onUp(e); }, {passive: false});

function drawAtom(x, y, label, radius, isCore, alpha = 1, pulse = false) {
  ctx.save(); ctx.translate(x, y); ctx.globalAlpha = alpha;
  if (pulse) {
      const p = (Math.sin(Date.now() * 0.005) + 1) / 2;
      ctx.fillStyle = "rgba(0, 255, 255, "+(0.1 * p)+")";
      ctx.beginPath(); ctx.arc(0, 0, radius * 3.5, 0, Math.PI*2); ctx.fill();
  }
  ctx.shadowColor = "rgba(0, 255, 255, 0.4)"; ctx.shadowBlur = 12;
  ctx.strokeStyle = "rgba(255,255,255,0.9)"; ctx.lineWidth = 1.5; ctx.fillStyle = "#000";
  ctx.beginPath(); ctx.arc(0, 0, radius, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  ctx.shadowBlur = 0; ctx.fillStyle = "#FFF";
  ctx.font = "200 " + (isCore ? "22px" : "12px") + " Helvetica Neue";
  ctx.textAlign = "center"; ctx.fillText(label.toUpperCase(), 0, isCore ? 8 : 4);
  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, width, height);
  ctx.save(); ctx.translate(width / 2, height / 2);
  const time = Date.now() * 0.002;

  // Dessin Ripple
  if (ripple.a > 0) {
      ctx.strokeStyle = `rgba(0, 255, 255, ${ripple.a})`;
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(ripple.x, ripple.y, ripple.r, 0, Math.PI*2); ctx.stroke();
      ripple.r += 5; ripple.a -= 0.02;
  }

  // Gestion appui long (Vers A-TOm)
  if (isPressing) {
      pressTimer += 0.016;
      if (pressTimer > 0.4) {
          const arc = Math.min(1, (pressTimer - 0.4) * 2);
          ctx.strokeStyle = "#0FF"; ctx.lineWidth = 2;
          ctx.beginPath(); ctx.arc(0, 0, 55, -Math.PI/2, (-Math.PI/2) + (Math.PI*2*arc)); ctx.stroke();
      }
  }

  const floatY = Math.sin(time) * 6;

  // Électrons de base
  baseElectrons.forEach((e, i) => {
      const ang = e.angle + Math.sin(time * 0.4 + i) * 0.05;
      drawAtom(Math.cos(ang)*e.dist, Math.sin(ang)*e.dist + floatY, e.label, 22, false);
  });

  // Électrons de suggestion (The Discovery Flux)
  atoms.forEach((a, i) => {
      a.angle += 0.005;
      if(a.dist > a.targetDist) a.dist -= 2;
      if(a.opacity < 1) a.opacity += 0.02;
      drawAtom(Math.cos(a.angle)*a.dist, Math.sin(a.angle)*a.dist + floatY, a.label, 18, false, a.opacity * 0.6, true);
  });

  // Noyau
  drawAtom(0, floatY, currentCore, 38, true, 1, true);

  ctx.restore(); requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
