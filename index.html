<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>the miny</title>
<style>
  body { margin: 0; background: #000; overflow: hidden; height: 100vh; font-family: -apple-system, sans-serif; color: #fff; touch-action: none; }
  canvas { display: block; }

  #ui { position: fixed; inset: 0; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 60px 30px; }
  #atom-voice { font-size: 13px; font-weight: 200; letter-spacing: 3px; color: #0FF; text-align: center; height: 50px; text-transform: uppercase; }

  #input-wrap { pointer-events: auto; border-bottom: 1px solid #111; }
  input { background: transparent; border: none; color: #fff; width: 100%; text-align: center; font-size: 18px; outline: none; padding: 15px; letter-spacing: 6px; font-weight: 100; text-transform: uppercase; }

  #gate { position: fixed; inset: 0; z-index: 100; background: #000; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>

<div id="gate" onclick="awaken()">
   <div style="text-align:center; letter-spacing:10px; font-size:11px; color:#444;">EVEIL DU NOYAU</div>
</div>

<div id="ui">
   <div id="atom-voice">SYSTÈME EN ATTENTE</div>
   <div id="input-wrap"><input type="text" id="flow-in" placeholder="..." autocomplete="off"></div>
</div>

<canvas id="cvs"></canvas>

<script>
const cvs = document.getElementById("cvs");
const ctx = cvs.getContext("2d");
const voice = document.getElementById("atom-voice");
const flowIn = document.getElementById("flow-in");

let w, h, ratio, cSize;
let myAtoms = []; 
let collisions = [];
let loc = "SCAN...";

function say(t) { voice.innerText = t; }

function awaken() {
   document.getElementById("gate").style.display = "none";
   say("A-TOm CONNECTÉ");
   navigator.geolocation.getCurrentPosition(p => {
       loc = `${p.coords.latitude.toFixed(3)} / ${p.coords.longitude.toFixed(3)}`;
       say("RÉSONANCE NANTES : ACTIVE");
   });
}

function resize() {
   ratio = window.devicePixelRatio || 1;
   w = window.innerWidth; h = window.innerHeight;
   cvs.width = w * ratio; cvs.height = h * ratio;
   ctx.scale(ratio, ratio);
   cSize = w * 0.15;
}
window.addEventListener("resize", resize); resize();

flowIn.addEventListener("keydown", (e) => {
   if(e.key === "Enter" && flowIn.value) {
       const v = flowIn.value;
       myAtoms.push({ l: v, a: Math.random()*6, d: 500, td: 160, c: "#0FF" });
       flowIn.value = "";
       say(`ANALYSE FLUX : ${v}`);
       setTimeout(() => {
           collisions.push({ l: v, a: Math.random()*6, d: 600, td: 220, c: "#FFF" });
           say("COLLISION DÉTECTÉE");
       }, 1500);
   }
});

function draw() {
   ctx.clearRect(0, 0, w, h);
   ctx.save(); ctx.translate(w/2, h/2);
   const time = Date.now() * 0.002;

   // Noyau m
   const p = (Math.sin(time*2)+1)/2;
   ctx.shadowBlur = 20 * p; ctx.shadowColor = "#0FF";
   ctx.strokeStyle = "#fff"; ctx.lineWidth = 1;
   ctx.beginPath(); ctx.arc(0, 0, cSize/2, 0, Math.PI*2); ctx.stroke();
   ctx.shadowBlur = 0; ctx.fillStyle = "#fff"; ctx.font = "100 20px Helvetica"; ctx.textAlign="center";
   ctx.fillText("m", 0, 7);

   // Orbites
   [myAtoms, collisions].forEach((group, idx) => {
       group.forEach(at => {
           at.a += (idx === 0 ? 0.006 : -0.003);
           if(at.d > at.td) at.d -= 4;
           const x = Math.cos(at.a)*at.d; const y = Math.sin(at.a)*at.d;
           ctx.strokeStyle = at.c; ctx.globalAlpha = (idx === 0 ? 0.8 : 0.3);
           ctx.beginPath(); ctx.arc(x, y, 12, 0, Math.PI*2); ctx.stroke();
           ctx.fillStyle = "#fff"; ctx.font = "8px Helvetica";
           ctx.fillText(at.l.toUpperCase(), x, y + 22);
           if(idx === 1) { // Ligne de résonance
               ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(x,y); 
               ctx.strokeStyle = "rgba(255,255,255,0.05)"; ctx.stroke();
           }
       });
   });

   ctx.globalAlpha = 0.2; ctx.font = "8px Helvetica"; ctx.fillText(loc, 0, h/2 - 100);
   ctx.restore(); requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
