<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>the miny</title>
<style>
  :root { --neon: #0FF; --text: #FFF; --sat: env(safe-area-inset-top); --sab: env(safe-area-inset-bottom); }

  body, html { 
      margin: 0; padding: 0; background: #000; overflow: hidden; 
      height: 100dvh; width: 100vw; position: fixed;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      -webkit-font-smoothing: antialiased;
  }

  /* Canvas de Fond : C'est la zone de réalité augmentée */
  canvas { position: absolute; inset: 0; z-index: 1; touch-action: none; }

  /* Couche d'Interface : Elle flotte par-dessus, normalisée sur la Safe Area */
  #ui-overlay {
      position: absolute; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      padding: calc(var(--sat) + 20px) 25px calc(var(--sab) + 20px) 25px;
      pointer-events: none; box-sizing: border-box;
  }

  header { flex: 0; text-align: center; }
  #voice-log { font-size: 11px; letter-spacing: 6px; color: var(--neon); text-transform: uppercase; font-weight: 200; opacity: 0.7; }

  /* Le point mort spatial : Cette zone invisible définit le centre absolu */
  #core-anchor { flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; }

  footer { flex: 0; display: flex; flex-direction: column; align-items: center; width: 100%; gap: 15px; }

  #pill-container { 
      width: 100%; max-width: 420px; 
      background: rgba(255,255,255,0.07); 
      border-radius: 60px; backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(255,255,255,0.12);
      pointer-events: auto;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
  }
  #pill-container:focus-within { border-color: var(--neon); background: rgba(0,255,255,0.05); }

  input { 
      background: transparent; border: none; color: var(--text); 
      width: 100%; text-align: center; font-size: 16px; outline: none; 
      padding: 20px 0; letter-spacing: 3px; text-transform: uppercase; font-weight: 200;
  }

  #loc-tag { font-size: 8px; color: rgba(0,255,255,0.3); letter-spacing: 3px; }

  #ignition { position: fixed; inset: 0; z-index: 100; background: #000; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #444; font-size: 11px; letter-spacing: 8px; }
</style>
</head>
<body>

<div id="ignition" onclick="ignite()">AMORCER A-TOM</div>

<div id="ui-overlay">
  <header><div id="voice-log">A-TOM : VEILLE</div></header>
  <div id="core-anchor"></div>
  <footer>
      <div id="pill-container"><input type="text" id="flow-input" placeholder="AJOUTER UN FLUX" autocomplete="off"></div>
      <div id="loc-tag">LOCATING...</div>
  </footer>
</div>

<canvas id="view"></canvas>

<script>
const view = document.getElementById("view"), ctx = view.getContext("2d");
const anchor = document.getElementById("core-anchor"), voice = document.getElementById("voice-log");
const flowIn = document.getElementById("flow-input"), locTag = document.getElementById("loc-tag");

let w, h, ratio, atoms = [], collisions = [];

function ignite() {
  document.getElementById("ignition").style.display = "none";
  voice.innerText = "NOYAU STABILISÉ";
  navigator.geolocation.getCurrentPosition(p => {
      locTag.innerText = `NANTES : ${p.coords.latitude.toFixed(3)} / ${p.coords.longitude.toFixed(3)}`;
  });
}

function sync() {
  ratio = window.devicePixelRatio || 1;
  w = window.innerWidth; h = window.innerHeight;
  view.width = w * ratio; view.height = h * ratio;
  ctx.scale(ratio, ratio);
}
window.addEventListener("resize", sync); sync();

flowIn.addEventListener("keydown", (e) => {
  if(e.key === "Enter" && flowIn.value) {
      // Physique Quark : Orbites compressées (max 150px)
      atoms.push({ l: flowIn.value, a: Math.random()*6, d: 250, td: 85, c: "#0FF" });
      voice.innerText = "CAPTATION FLUX";
      flowIn.value = "";

      // Collision Programmée : Étape supplémentaire d'ambition
      setTimeout(() => {
          collisions.push({ l: "COLLISION", a: Math.random()*6, d: 350, td: 150, c: "#FFF", msg: "RÉSONANCE ACTIVE" });
          voice.innerText = "RÉSONANCE INTÉGRÉE";
      }, 1500);
  }
});

function draw() {
  ctx.clearRect(0, 0, w, h);

  // RECALCUL DU CENTRE PHYSIQUE DE L'ANCRE HTML À CHAQUE FRAME
  const rect = anchor.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;

  // Matrice de Transformation : Le point (0,0) du dessin est le centre réel de l'iPhone
  ctx.save(); ctx.translate(cx, cy);

  // NOYAU CENTRAL (m) : Ancrage visuel indestructible
  ctx.strokeStyle = "rgba(0,255,255,0.4)"; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(0, 0, 30, 0, Math.PI*2); ctx.stroke();

  ctx.fillStyle = "#fff"; ctx.font = "100 22px Helvetica Neue"; ctx.textAlign="center";
  ctx.fillText("m", 0, 8);

  // GESTION DES QUARKS (FLUX & RÉSONANCES)
  [atoms, collisions].forEach((group, idx) => {
      group.forEach(at => {
          at.a += (idx === 0 ? 0.007 : -0.003); // Rotation synchrone/asynchrone
          at.d += (at.td - at.d) * 0.06; // Attraction Quark

          const x = Math.cos(at.a)*at.d, y = Math.sin(at.a)*at.d;

          // Dessin de l'entité
          ctx.strokeStyle = at.c; ctx.globalAlpha = (idx === 0 ? 1 : 0.5);
          ctx.beginPath(); ctx.arc(x, y, 12, 0, Math.PI*2); ctx.stroke();

          // Typographie Normalisée Système
          ctx.fillStyle = "#fff"; ctx.font = "200 10px Helvetica Neue";
          ctx.fillText(at.l.toUpperCase(), x, y + 26);

          // Message de collision supplémentaire
          if(idx === 1 && at.d < 160) {
              ctx.fillStyle = "#0FF"; ctx.fillText(at.msg, x, y - 22);
          }
      });
  });
  ctx.restore();

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
