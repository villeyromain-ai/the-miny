<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>the miny - v22.22 Collision</title>
<style>
  body { margin: 0; background: #000; overflow: hidden; height: 100vh; font-family: -apple-system, sans-serif; color: #fff; touch-action: none; }
  canvas { display: block; }
  #ui-layer { position: fixed; inset: 0; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 50px 25px; }
  #collision-alert { font-size: 11px; letter-spacing: 3px; color: #fff; text-align: center; opacity: 0; transition: 0.5s; background: rgba(0,255,255,0.1); padding: 10px; border-radius: 20px; align-self: center; }
  #input-box { pointer-events: auto; width: 100%; text-align: center; }
  input { background: transparent; border: none; border-bottom: 1px solid #222; color: #fff; width: 80%; text-align: center; font-size: 16px; outline: none; padding: 10px; letter-spacing: 4px; font-weight: 100; text-transform: uppercase; }
</style>
</head>
<body>

<div id="ui-layer">
   <div id="collision-alert">COLLISION DÉTECTÉE : NANTES CENTRE</div>
   <div id="input-box"><input type="text" id="main-in" placeholder="AJOUTER UN FLUX..." autocomplete="off"></div>
</div>

<canvas id="minyCanvas"></canvas>

<script>
const canvas = document.getElementById("minyCanvas");
const ctx = canvas.getContext("2d");
const alertBox = document.getElementById("collision-alert");
const mainIn = document.getElementById("main-in");

let width, height, ratio, coreSize;
let myInterests = []; 
let collisions = []; // Atomes d'autres utilisateurs/entreprises
let isAttracting = false;

function resize() {
   ratio = window.devicePixelRatio || 1;
   width = window.innerWidth; height = window.innerHeight;
   canvas.width = width * ratio; canvas.height = height * ratio;
   ctx.scale(ratio, ratio);
   coreSize = width * 0.14;
}
window.addEventListener("resize", resize); resize();

// Simulation de collisions entrantes
function spawnCollision(label) {
   collisions.push({
       label: label,
       ang: Math.random() * 6.2,
       d: 500,
       targetD: 220,
       type: Math.random() > 0.5 ? 'user' : 'pro',
       o: 0
   });
   alertBox.style.opacity = 1;
   setTimeout(() => alertBox.style.opacity = 0, 3000);
}

mainIn.addEventListener("keydown", (e) => {
   if(e.key === "Enter" && mainIn.value) {
       myInterests.push({ label: mainIn.value, ang: Math.random()*6, d: 400, targetD: 150, o: 0 });
       const savedVal = mainIn.value;
       mainIn.value = "";
       // A-TOm simule une recherche de collision après 2 secondes
       setTimeout(() => spawnCollision(savedVal), 2000);
   }
});

function drawAtom(x, y, label, radius, color, alpha, isCore) {
   ctx.save(); ctx.translate(x, y); ctx.globalAlpha = alpha;

   // Orbite de l'atome
   ctx.strokeStyle = color; ctx.lineWidth = 1;
   ctx.beginPath(); ctx.arc(0, 0, radius, 0, Math.PI*2); ctx.stroke();

   // Label
   ctx.fillStyle = "#fff";
   ctx.font = `100 ${isCore ? '20px' : '9px'} Helvetica`;
   ctx.textAlign = "center";
   ctx.fillText(label.toUpperCase(), 0, isCore ? 7 : 3);
   ctx.restore();
}

function draw() {
   ctx.clearRect(0, 0, width, height);
   ctx.save(); ctx.translate(width/2, height/2);
   const time = Date.now() * 0.002;

   // NOYAU CENTRAL
   const pulse = (Math.sin(time*2)+1)/2;
   drawAtom(0, Math.sin(time)*5, "m", coreSize/2 + (pulse*2), "#0FF", 1, true);

   // MES INTÉRÊTS (Cyan)
   myInterests.forEach(a => {
       a.ang += 0.006; if(a.d > a.targetD) a.d -= 3;
       drawAtom(Math.cos(a.ang)*a.d, Math.sin(a.ang)*a.d, a.label, 15, "#0FF", 0.8, false);
   });

   // COLLISIONS (Blanches/Grisées)
   collisions.forEach((c, i) => {
       c.ang -= 0.003; // Sens inverse pour différencier
       if(c.d > c.targetD) c.d -= 2;
       const color = c.type === 'pro' ? '#0FF' : '#fff';
       drawAtom(Math.cos(c.ang)*c.d, Math.sin(c.ang)*c.d, c.label, 12, color, 0.4, false);

       // Ligne de connexion si proche
       if(c.d < 250) {
           ctx.strokeStyle = `rgba(255,255,255,${0.1})`;
           ctx.beginPath(); ctx.moveTo(0,0); 
           ctx.lineTo(Math.cos(c.ang)*c.d, Math.sin(c.ang)*c.d); ctx.stroke();
       }
   });

   ctx.restore(); requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
