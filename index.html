<!DOCTYPE html>
<html lang="fr">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
   <meta name="apple-mobile-web-app-capable" content="yes">
   <style>
       :root { --cyan-ice: #e0ffff; --cyan-neon: #00ffff; --sat: env(safe-area-inset-top); --sab: env(safe-area-inset-bottom); }
       body, html { margin:0; padding:0; background:#000; overflow:hidden; height:100dvh; width:100vw; position:fixed; font-family: -apple-system, sans-serif; }

       /* Filtre de post-processing pour le glow glacé */
       #stage-container { position: absolute; inset:0; filter: blur(0.4px) contrast(1.1); z-index: 1; }
       canvas { display: block; touch-action: none; }

       #ui-layer {
           position: absolute; inset: 0; z-index: 10; pointer-events: none;
           display: flex; flex-direction: column; justify-content: space-between;
           padding: calc(var(--sat) + 20px) 25px calc(var(--sab) + 30px) 25px;
       }
       header { text-align: center; color: var(--cyan-neon); font-size: 9px; letter-spacing: 6px; font-weight: 200; text-transform: uppercase; opacity: 0.6; }
       footer { display: flex; flex-direction: column; align-items: center; gap: 20px; }

       #input-shield { 
           width: 100%; max-width: 480px; height: 62px;
           background: rgba(255,255,255,0.02); border-radius: 31px;
           backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
           border: 0.5px solid rgba(0, 255, 255, 0.15);
           display: flex; align-items: center; pointer-events: auto;
           transition: transform 0.4s;
       }
       #input-shield:focus-within { border-color: var(--cyan-ice); background: rgba(0, 255, 255, 0.05); transform: translateY(-3px); }
       input { background: transparent; border: none; color: #fff; width: 100%; text-align: center; font-size: 15px; outline: none; letter-spacing: 3px; text-transform: uppercase; font-weight: 200; }
       #geo { font-size: 7px; color: var(--cyan-neon); opacity: 0.3; letter-spacing: 4px; }
   </style>
</head>
<body>

<div id="stage-container"><canvas id="canvas"></canvas></div>

<div id="ui-layer">
   <header>A-TOM : RÉSONANCE PHOTONIQUE</header>
   <footer>
       <div id="input-shield"><input type="text" id="flow" placeholder="INJECTER L'INTÉRÊT" autocomplete="off"></div>
       <div id="geo">STABILISATION NANTES...</div>
   </footer>
</div>

<script>
const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
const flow = document.getElementById('flow');
let w, h, dpr, particles = [], pulses = [];

function sync() {
   dpr = window.devicePixelRatio || 1;
   w = window.innerWidth; h = window.innerHeight;
   canvas.width = w * dpr; canvas.height = h * dpr;
   ctx.scale(dpr, dpr);
}
window.addEventListener('resize', sync); sync();

flow.addEventListener('keydown', (e) => {
   if(e.key === 'Enter' && flow.value) {
       const text = flow.value;
       // Création de l'électron
       particles.push({
           t: text.toUpperCase(), a: Math.random()*6.28, r: 400, tr: 85 + (Math.random()*30),
           s: 0.008 + (Math.random()*0.005), pulse: 0
       });
       // Déclenchement de la pulsation Cyan Glacé
       pulses.push({ r: 30, maxR: 250, alpha: 1 });
       flow.value = '';
   }
});

function draw() {
   ctx.clearRect(0, 0, w, h);
   const cx = w/2, cy = h/2;

   // 1. DESSIN DES PULSATIONS (Halo de connexion)
   pulses.forEach((p, i) => {
       ctx.beginPath();
       ctx.arc(cx, cy, p.r, 0, Math.PI*2);
       ctx.strokeStyle = `rgba(224, 255, 255, ${p.alpha})`; // Cyan Glacé
       ctx.lineWidth = 2;
       ctx.stroke();

       p.r += 4;
       p.alpha -= 0.015;
       if(p.alpha <= 0) pulses.splice(i, 1);
   });

   ctx.save();
   ctx.translate(cx, cy);

   // 2. NOYAU CENTRAL (m)
   ctx.shadowBlur = 15;
   ctx.shadowColor = "rgba(0, 255, 255, 0.5)";
   ctx.strokeStyle = "rgba(0, 255, 255, 0.4)";
   ctx.beginPath(); ctx.arc(0, 0, 28, 0, Math.PI*2); ctx.stroke();
   ctx.shadowBlur = 0;

   ctx.fillStyle = "#fff"; ctx.font = "200 22px Helvetica"; ctx.textAlign="center";
   ctx.fillText("m", 0, 8);

   // 3. ÉLECTRONS AVEC HALO CONSTANT
   particles.forEach(p => {
       p.a += p.s;
       p.r += (p.tr - p.r) * 0.1;
       const x = Math.cos(p.a)*p.r, y = Math.sin(p.a)*p.r;

       // Halo blanc-cyan glacé (constant)
       const gradient = ctx.createRadialGradient(x, y, 0, x, y, 15);
       gradient.addColorStop(0, 'rgba(224, 255, 255, 0.4)');
       gradient.addColorStop(1, 'rgba(0, 255, 255, 0)');
       ctx.fillStyle = gradient;
       ctx.beginPath(); ctx.arc(x, y, 15, 0, Math.PI*2); ctx.fill();

       // Point de matière
       ctx.fillStyle = "#e0ffff";
       ctx.beginPath(); ctx.arc(x, y, 2.5, 0, Math.PI*2); ctx.fill();

       // Label Sémantique
       ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
       ctx.font = "300 9px Helvetica";
       ctx.letterSpacing = "2px";
       ctx.fillText(p.t, x, y + 25);
   });

   ctx.restore();
   requestAnimationFrame(draw);
}

navigator.geolocation.watchPosition(pos => {
   document.getElementById('geo').innerText = `NANTES : ${pos.coords.latitude.toFixed(4)} | ${pos.coords.longitude.toFixed(4)}`;
});

draw();
</script>
</body>
</html>
