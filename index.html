<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>the miny</title>
<style>
  :root { --sat: env(safe-area-inset-top); --sab: env(safe-area-inset-bottom); }

  /* Verrouillage total du scroll et de l'élasticité iOS */
  body, html { 
      margin: 0; padding: 0; background: #000; overflow: hidden; 
      height: 100%; width: 100%; position: fixed;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  }

  #main-stage {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      padding: var(--sat) 0 var(--sab) 0;
      z-index: 10; pointer-events: none;
  }

  /* Le Canvas prend tout l'espace derrière */
  canvas { position: absolute; inset: 0; z-index: 1; touch-action: none; }

  #top-infobar { flex: 0 0 60px; display: flex; align-items: center; justify-content: center; }
  #voice-log { font-size: 9px; letter-spacing: 5px; color: #0FF; text-transform: uppercase; font-weight: 200; }

  /* Zone de respiration pour le noyau m */
  #core-space { flex: 1; width: 100%; }

  #bottom-actions { flex: 0 0 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; }
  #input-wrap { 
      width: 85%; max-width: 350px; background: rgba(255,255,255,0.07); 
      border-radius: 50px; backdrop-filter: blur(20px); 
      border: 1px solid rgba(255,255,255,0.12);
  }
  input { 
      background: transparent; border: none; color: #fff; width: 100%; 
      text-align: center; font-size: 14px; outline: none; padding: 18px 0; 
      letter-spacing: 3px; text-transform: uppercase; font-weight: 200;
  }
  #loc-tag { font-size: 7px; color: rgba(255,255,255,0.2); margin-top: 15px; letter-spacing: 2px; }

  #launch-gate { position: fixed; inset: 0; z-index: 100; background: #000; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .trigger-text { border: 1px solid #333; padding: 15px 30px; border-radius: 50px; font-size: 9px; letter-spacing: 5px; color: #777; }
</style>
</head>
<body>

<div id="launch-gate" onclick="ignite()">
   <div class="trigger-text">RÉTABLIR L'HORIZON</div>
</div>

<div id="main-stage">
   <div id="top-infobar"><div id="voice-log">STABILISATION...</div></div>
   <div id="core-space"></div>
   <div id="bottom-actions">
       <div id="input-wrap"><input type="text" id="flow-field" placeholder="AJOUTER UN FLUX" autocomplete="off"></div>
       <div id="loc-tag">NANTES : SCAN EN COURS</div>
   </div>
</div>

<canvas id="view"></canvas>

<script>
const view = document.getElementById("view"), ctx = view.getContext("2d");
const coreSpace = document.getElementById("core-space"), voice = document.getElementById("voice-log");
const flowIn = document.getElementById("flow-field"), locTag = document.getElementById("loc-tag");

let w, h, ratio, atoms = [], collisions = [];

function ignite() {
   document.getElementById("launch-gate").style.display = "none";
   voice.innerText = "NOYAU STABILISÉ";
   navigator.geolocation.getCurrentPosition(p => {
       locTag.innerText = `NANTES : ${p.coords.latitude.toFixed(3)} / ${p.coords.longitude.toFixed(3)}`;
   });
}

function resize() {
   ratio = window.devicePixelRatio || 1;
   w = window.innerWidth; h = window.innerHeight;
   view.width = w * ratio; view.height = h * ratio;
   ctx.scale(ratio, ratio);
}
window.addEventListener("resize", resize); resize();

flowIn.addEventListener("keydown", (e) => {
   if(e.key === "Enter" && flowIn.value) {
       // Rayons d'orbites réduits pour éviter de sortir de l'écran (80px - 140px)
       atoms.push({ l: flowIn.value, a: Math.random()*6, d: 250, td: 85, c: "#0FF" });
       voice.innerText = "FLUX INTÉGRÉ";
       flowIn.value = "";
       setTimeout(() => {
           collisions.push({ l: "COLLISION", a: Math.random()*6, d: 350, td: 145, c: "#FFF", msg: "RÉSONANCE" });
           voice.innerText = "COLLISION DÉTECTÉE";
       }, 1200);
   }
});

function draw() {
   ctx.clearRect(0, 0, w, h);

   // CALCUL DU CENTRE BASÉ SUR L'ESPACE RÉEL DISPONIBLE
   const rect = coreSpace.getBoundingClientRect();
   const cx = rect.left + rect.width / 2;
   const cy = rect.top + rect.height / 2;

   ctx.save(); ctx.translate(cx, cy);

   // NOYAU "m"
   ctx.strokeStyle = "rgba(0,255,255,0.3)"; ctx.lineWidth = 1;
   ctx.beginPath(); ctx.arc(0, 0, 28, 0, Math.PI*2); ctx.stroke();
   ctx.fillStyle = "#fff"; ctx.font = "100 16px Helvetica"; ctx.textAlign="center";
   ctx.fillText("m", 0, 6);

   // ÉLECTRONS (FLUX)
   [atoms, collisions].forEach((group, idx) => {
       group.forEach(at => {
           at.a += (idx === 0 ? 0.007 : -0.003);
           at.d += (at.td - at.d) * 0.05;
           const x = Math.cos(at.a)*at.d, y = Math.sin(at.a)*at.d;
           ctx.strokeStyle = at.c; ctx.globalAlpha = (idx === 0 ? 1 : 0.4);
           ctx.beginPath(); ctx.arc(x, y, 11, 0, Math.PI*2); ctx.stroke();
           ctx.fillStyle = "#fff"; ctx.font = "8px Helvetica";
           ctx.fillText(at.l.toUpperCase(), x, y + 22);
           if(idx === 1 && at.d < 160) {
               ctx.fillStyle = "#0FF"; ctx.fillText(at.msg, x, y - 18);
           }
       });
   });
   ctx.restore();

   requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
