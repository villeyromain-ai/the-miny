<!DOCTYPE html>
<html lang="fr">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
   <style>
       :root { --glace: #E0FFFF; --cyan: #00FFFF; --void: #000000; }
       body, html { margin:0; padding:0; background: var(--void); overflow:hidden; height:100dvh; width:100vw; position:fixed; color: #fff; }

       /* Suppression totale de l'UI classique */
       canvas { position: absolute; inset:0; z-index: 1; }

       #invisible-input {
           position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%);
           z-index: 10; width: 80%; pointer-events: auto;
       }
       input {
           background: transparent; border: none; color: rgba(255,255,255,0.7);
           width: 100%; text-align: center; font-size: 11px; outline: none;
           letter-spacing: 10px; text-transform: uppercase; font-weight: 100;
       }

       #hud {
           position: absolute; top: 60px; width: 100%; text-align: center;
           font-size: 8px; letter-spacing: 15px; font-weight: 100; opacity: 0.4;
           color: var(--cyan); pointer-events: none; z-index: 5;
       }
   </style>
</head>
<body>

<div id="hud">RÉSONANCE ACTIVE</div>
<canvas id="quantum"></canvas>
<div id="invisible-input"><input type="text" id="stream" placeholder="..." autocomplete="off"></div>

<script>
const canvas = document.getElementById('quantum'), ctx = canvas.getContext('2d');
const stream = document.getElementById('stream');
let w, h, dpr, electrons = [], pulses = [];

function sync() {
   dpr = window.devicePixelRatio || 1;
   w = window.innerWidth; h = window.innerHeight;
   canvas.width = w * dpr; canvas.height = h * dpr;
   ctx.scale(dpr, dpr);
}
window.addEventListener('resize', sync); sync();

// L'atome resserré avec 'm' au noyau
stream.addEventListener('keydown', (e) => {
   if(e.key === 'Enter' && stream.value) {
       electrons.push({
           t: stream.value.toUpperCase(),
           a: Math.random() * Math.PI * 2,
           r: 70 + Math.random() * 40, // Atome resserré
           v: 0.01 + Math.random() * 0.02,
           life: 0
       });
       // Pulsations cyan glacé lors de la connexion
       pulses.push({ r: 40, a: 1.0 }); 
       stream.value = '';
   }
});

function draw() {
   // Effet de vide quantique : accumulation de lumière
   ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
   ctx.fillRect(0, 0, w, h);

   const cx = w/2, cy = h/2;

   // 1. PULSATIONS CYAN GLACÉ
   pulses.forEach((p, i) => {
       ctx.beginPath();
       ctx.arc(cx, cy, p.r, 0, Math.PI*2);
       ctx.strokeStyle = `rgba(0, 255, 255, ${p.a * 0.5})`;
       ctx.lineWidth = 0.5;
       ctx.stroke();
       p.r += 8; p.a -= 0.02;
       if(p.a <= 0) pulses.splice(i, 1);
   });

   ctx.save();
   ctx.translate(cx, cy);

   // 2. LE NOYAU 'm' FLOTTANT
   ctx.shadowBlur = 20; ctx.shadowColor = "rgba(0, 255, 255, 0.6)";
   ctx.fillStyle = "#fff";
   ctx.font = "200 24px 'Helvetica Neue'";
   ctx.textAlign = "center";
   // Mouvement de flottement léger
   const floatY = Math.sin(Date.now() * 0.001) * 3;
   ctx.fillText("m", 0, 8 + floatY);

   // 3. ÉLECTRONS : BOUSSOLES ET HALOS
   electrons.forEach(e => {
       e.a += e.v;
       e.life += 0.01;

       // Position boussole
       const x = Math.cos(e.a) * e.r;
       const y = Math.sin(e.a) * e.r;

       // Halo blanc-cyan glacé constant
       const g = ctx.createRadialGradient(x, y, 0, x, y, 20);
       g.addColorStop(0, 'rgba(224, 255, 255, 0.4)');
       g.addColorStop(1, 'rgba(0, 255, 255, 0)');
       ctx.fillStyle = g;
       ctx.beginPath(); ctx.arc(x, y, 20, 0, Math.PI*2); ctx.fill();

       // L'électron (La boussole)
       ctx.fillStyle = "#fff";
       ctx.beginPath(); ctx.arc(x, y, 1.5, 0, Math.PI*2); ctx.fill();

       // Texte sémantique estompé
       ctx.globalAlpha = Math.min(e.life, 0.6);
       ctx.font = "100 8px 'Helvetica Neue'";
       ctx.fillText(e.t, x, y + 20);
       ctx.globalAlpha = 1.0;
   });

   ctx.restore();
   requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
