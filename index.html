<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>the miny</title>
<style>
  body { margin: 0; background: #000; overflow: hidden; height: 100vh; font-family: -apple-system, sans-serif; color: #fff; touch-action: none; }
  canvas { display: block; }
  #ui { position: fixed; inset: 0; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 60px 30px; }
  #voice { font-size: 10px; letter-spacing: 5px; color: #0FF; text-align: center; height: 40px; text-transform: uppercase; font-weight: 200; text-shadow: 0 0 10px rgba(0,255,255,0.5); }
  #input-wrap { pointer-events: auto; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
  input { background: transparent; border: none; color: #fff; width: 100%; text-align: center; font-size: 16px; outline: none; padding: 10px; letter-spacing: 5px; font-weight: 100; text-transform: uppercase; }
  #gate { position: fixed; inset: 0; z-index: 100; background: #000; display: flex; align-items: center; justify-content: center; }
  .btn { border: 1px solid #222; padding: 15px 30px; border-radius: 40px; font-size: 9px; letter-spacing: 5px; color: #444; }
</style>
</head>
<body>

<div id="gate" onclick="init()">
   <div class="btn">SYSTÈME NERVEUX v22.25</div>
</div>

<div id="ui">
   <div id="voice">NOYAU PRÊT</div>
   <div id="input-wrap"><input type="text" id="flow" placeholder="FLUX D'INTÉRÊT..." autocomplete="off"></div>
</div>

<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");
const voice = document.getElementById("voice");
const flow = document.getElementById("flow");

let w, h, ratio, cSize, atoms = [], collisions = [], loc = "NANTES : RECHERCHE...";

function say(t) { voice.innerText = t; }

function init() {
   document.getElementById("gate").style.display = "none";
   say("A-TOm : RÉSONANCE ACTIVE");
   navigator.geolocation.getCurrentPosition(p => {
       loc = `NANTES : ${p.coords.latitude.toFixed(3)} / ${p.coords.longitude.toFixed(3)}`;
   });
}

function resize() {
   ratio = window.devicePixelRatio || 1;
   w = window.innerWidth; h = window.innerHeight;
   c.width = w * ratio; c.height = h * ratio;
   ctx.scale(ratio, ratio);
   cSize = w * 0.16;
}
window.addEventListener("resize", resize); resize();

flow.addEventListener("keydown", (e) => {
   if(e.key === "Enter" && flow.value) {
       atoms.push({ l: flow.value, a: Math.random()*6, d: 500, td: 130, c: "#0FF" });
       const v = flow.value; flow.value = "";
       say(`RECHERCHE DE COLLISION : ${v}`);
       setTimeout(() => {
           collisions.push({ l: v, a: Math.random()*6, d: 600, td: 210, c: "#FFF", m: "REJOINDRE LE FLUX ?" });
           say("COLLISION ÉTABLIE");
       }, 2000);
   }
});

function draw() {
   ctx.clearRect(0, 0, w, h);
   ctx.save(); ctx.translate(w/2, h/2);
   const time = Date.now() * 0.002;

   // NOYAU m
   const p = (Math.sin(time*2)+1)/2;
   ctx.shadowBlur = 10 * p; ctx.shadowColor = "#0FF";
   ctx.strokeStyle = "rgba(255,255,255,0.8)";
   ctx.beginPath(); ctx.arc(0, 0, cSize/2, 0, Math.PI*2); ctx.stroke();
   ctx.shadowBlur = 0; ctx.fillStyle = "#fff"; ctx.font = "100 20px Helvetica"; ctx.textAlign="center";
   ctx.fillText("m", 0, 7);

   // DESSIN DES ORBITES
   [atoms, collisions].forEach((g, idx) => {
       g.forEach(at => {
           at.a += (idx === 0 ? 0.005 : -0.002);
           at.d += (at.td - at.d) * 0.05;
           const x = Math.cos(at.a)*at.d, y = Math.sin(at.a)*at.d;
           ctx.strokeStyle = at.c; ctx.globalAlpha = (idx === 0 ? 1 : 0.3);
           ctx.beginPath(); ctx.arc(x, y, 13, 0, Math.PI*2); ctx.stroke();
           ctx.fillStyle = "#fff"; ctx.font = "8px Helvetica";
           ctx.fillText(at.l.toUpperCase(), x, y + 24);
           if(idx === 1 && at.d < 220) {
               ctx.fillStyle = "#0FF"; ctx.fillText(at.m, x, y - 18);
               ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(x,y); 
               ctx.strokeStyle = "rgba(0,255,255,0.1)"; ctx.stroke();
           }
       });
   });

   ctx.globalAlpha = 0.2; ctx.font = "7px Helvetica"; ctx.fillText(loc, 0, h/2 - 90);
   ctx.restore(); requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
