<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>the miny</title>
<style>
  :root { --sat: env(safe-area-inset-top); --sab: env(safe-area-inset-bottom); }
  body, html { 
      margin: 0; padding: 0; background: #000; overflow: hidden; 
      height: 100%; width: 100%; position: fixed;
      font-family: -apple-system, sans-serif; color: #fff;
  }

  /* Le canevas reste en arrière-plan total */
  canvas { position: absolute; inset: 0; z-index: 1; touch-action: none; }

  /* L'interface s'adapte strictement à la zone visible */
  #app-frame {
      position: relative; z-index: 10;
      height: 100vh; width: 100vw;
      display: flex; flex-direction: column;
      padding: calc(var(--sat) + 20px) 25px calc(var(--sab) + 20px) 25px;
      box-sizing: border-box;
      pointer-events: none;
  }

  #header { flex: 0 0 50px; text-align: center; }
  #voice { font-size: 10px; letter-spacing: 5px; color: #0FF; text-transform: uppercase; font-weight: 200; }

  /* Zone centrale vide pour laisser le noyau respirer */
  #spacer { flex: 1; }

  #footer { flex: 0 0 80px; pointer-events: auto; }
  #input-pill { 
      background: rgba(255,255,255,0.08); 
      border-radius: 50px; backdrop-filter: blur(15px); 
      border: 1px solid rgba(255,255,255,0.1);
      overflow: hidden;
  }
  input { 
      background: transparent; border: none; color: #fff; width: 100%; 
      text-align: center; font-size: 15px; outline: none; padding: 18px 0; 
      letter-spacing: 3px; font-weight: 200; text-transform: uppercase; 
  }

  #boot-screen { 
      position: fixed; inset: 0; z-index: 100; background: #000; 
      display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .pulse-btn { border: 1px solid #333; padding: 15px 30px; border-radius: 40px; font-size: 9px; letter-spacing: 4px; color: #666; }
</style>
</head>
<body>

<div id="boot-screen" onclick="start()">
   <div class="pulse-btn">RÉALIGNER LE FLUX</div>
</div>

<div id="app-frame">
   <div id="header"><div id="voice">ALIGNEMENT...</div></div>
   <div id="spacer"></div>
   <div id="footer">
       <div id="input-pill"><input type="text" id="flow-in" placeholder="AJOUTER UN FLUX" autocomplete="off"></div>
   </div>
</div>

<canvas id="stage"></canvas>

<script>
const stage = document.getElementById("stage"), ctx = stage.getContext("2d");
const voice = document.getElementById("voice"), flowIn = document.getElementById("flow-in");

let w, h, ratio, cSize, atoms = [], collisions = [], loc = "NANTES : SCAN...";

function say(t) { voice.innerText = t; }

function start() {
   document.getElementById("boot-screen").style.display = "none";
   say("A-TOm : PRÊT");
   navigator.geolocation.getCurrentPosition(p => {
       loc = `NANTES : ${p.coords.latitude.toFixed(3)} / ${p.coords.longitude.toFixed(3)}`;
   });
}

function resize() {
   ratio = window.devicePixelRatio || 1;
   w = window.innerWidth; h = window.innerHeight;
   stage.width = w * ratio; stage.height = h * ratio;
   ctx.scale(ratio, ratio);
   cSize = Math.min(w, h) * 0.16;
}
window.addEventListener("resize", resize); resize();

flowIn.addEventListener("keydown", (e) => {
   if(e.key === "Enter" && flowIn.value) {
       atoms.push({ l: flowIn.value, a: Math.random()*6, d: 350, td: 110, c: "#0FF" });
       say(`FLUX ANALYSÉ`);
       flowIn.value = "";
       setTimeout(() => {
           collisions.push({ l: "COLLISION", a: Math.random()*6, d: 450, td: 180, c: "#FFF", m: "RÉSONANCE ACTIVE" });
           say("COLLISION DÉTECTÉE");
       }, 1500);
   }
});

function draw() {
   ctx.clearRect(0, 0, w, h);
   // On dessine le centre un peu plus haut (0.45 au lieu de 0.5) pour l'équilibre visuel iPhone
   ctx.save(); ctx.translate(w/2, h * 0.45);
   const time = Date.now() * 0.002;

   // NOYAU
   ctx.strokeStyle = "rgba(255,255,255,0.6)"; ctx.lineWidth = 1;
   ctx.beginPath(); ctx.arc(0, 0, cSize/2, 0, Math.PI*2); ctx.stroke();
   ctx.fillStyle = "#fff"; ctx.font = "100 18px Helvetica"; ctx.textAlign="center";
   ctx.fillText("m", 0, 7);

   // SYSTÈME ORBITAL
   [atoms, collisions].forEach((g, idx) => {
       g.forEach(at => {
           at.a += (idx === 0 ? 0.005 : -0.002);
           at.d += (at.td - at.d) * 0.04;
           const x = Math.cos(at.a)*at.d, y = Math.sin(at.a)*at.d;
           ctx.strokeStyle = at.c; ctx.globalAlpha = (idx === 0 ? 1 : 0.4);
           ctx.beginPath(); ctx.arc(x, y, 14, 0, Math.PI*2); ctx.stroke();
           ctx.fillStyle = "#fff"; ctx.font = "9px Helvetica";
           ctx.fillText(at.l.toUpperCase(), x, y + 26);
           if(idx === 1 && at.d < 220) {
               ctx.fillStyle = "#0FF"; ctx.fillText(at.m, x, y - 22);
           }
       });
   });
   ctx.restore();

   // SIGNATURE POSITIONNÉE SELON LA HAUTEUR RÉELLE
   ctx.save();
   ctx.translate(w/2, h - 140);
   ctx.globalAlpha = 0.2; ctx.fillStyle = "#fff"; ctx.font = "7px Helvetica"; ctx.textAlign="center";
   ctx.fillText(loc, 0, 0);
   ctx.restore();

   requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
