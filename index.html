<!DOCTYPE html>
<html lang="fr">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
   <title>the miny - v17.5.1</title>
   <style>
       body { 
           margin: 0; background: #000; color: #fff; 
           font-family: -apple-system, sans-serif; 
           height: 100vh; display: flex; flex-direction: column; 
           align-items: center; justify-content: flex-start; overflow: hidden; 
           padding-top: 20vh;
       }

       /* LE SCEAU : Géométrie Cyan Glacé */
       #sceau { 
           width: 90px; height: 90px; position: relative; 
           margin-bottom: 40px; cursor: pointer;
           transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
       }

       .noyau {
           width: 8px; height: 8px; background: #fff; border-radius: 50%;
           position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
           box-shadow: 0 0 10px rgba(224, 255, 255, 0.6);
       }

       .electron { 
           width: 6px; height: 6px; background: #e0ffff; 
           position: absolute; border-radius: 50%; 
           box-shadow: 0 0 12px rgba(224, 255, 255, 0.9);
       }

       #e1 { top: 0; left: 50%; transform: translateX(-50%); }
       #e2 { bottom: 0; left: 0; }
       #e3 { bottom: 0; right: 0; }

       #input-flux { 
           background: transparent; border: none; 
           border-bottom: 1px solid #222; color: #fff; 
           text-align: center; font-size: 1.1rem; outline: none; 
           width: 220px; letter-spacing: 5px; padding: 10px 0;
           text-transform: uppercase; margin-bottom: 20px;
       }

       /* THE STREAM (LE FLUX) */
       #stream {
           width: 100%; max-width: 300px;
           height: 30vh; overflow-y: auto;
           mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
           -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
           padding: 10px;
       }

       .flux-item {
           font-size: 0.6rem; letter-spacing: 2px; color: #444;
           text-transform: uppercase; margin-bottom: 15px;
           border-left: 1px solid #222; padding-left: 10px;
           animation: fadeIn 0.8s ease forwards;
       }

       .flux-item b { color: #e0ffff; }

       @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

       #status { 
           font-size: 0.55rem; letter-spacing: 2px; color: #333; 
           text-align: center; margin-top: 10px; text-transform: uppercase;
       }
   </style>
</head>
<body>

   <div id="sceau" onclick="activerCollision()">
       <div class="noyau"></div>
       <div class="electron" id="e1"></div>
       <div class="electron" id="e2"></div>
       <div class="electron" id="e3"></div>
   </div>

   <input type="text" id="input-flux" placeholder="INTERÊT" onkeydown="if(event.key==='Enter') activerCollision()">

   <div id="stream"></div>
   <div id="status">SYSTÈME PASSIF | NANTES</div>

   <script>
       function activerCollision() {
           const input = document.getElementById('input-flux');
           const val = input.value;
           if(!val) return;

           const sceau = document.getElementById('sceau');
           const stream = document.getElementById('stream');

           sceau.style.transform = 'rotate(1080deg)';

           navigator.geolocation.getCurrentPosition(function(position) {
               const lat = position.coords.latitude.toFixed(3);
               const lon = position.coords.longitude.toFixed(3);
               const intensite = Math.floor(Math.random() * 40) + 60;
               const collisions = Math.floor(Math.random() * 8) + 1;

               setTimeout(() => {
                   // Création de l'élément dans le flux
                   const item = document.createElement('div');
                   item.className = 'flux-item';
                   item.innerHTML = `<b>${val}</b> • ${intensite}% RESONANCE<br>${collisions} COLLISIONS • ${lat}/${lon}`;

                   stream.insertBefore(item, stream.firstChild);

                   sceau.style.transform = 'rotate(0deg)';
                   input.value = ''; // Reset input pour le prochain flux
               }, 1000);
           });
       }
   </script>
</body>
</html>
