<!DOCTYPE html>
<html lang="fr">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
   <title>the miny - v17.5 PURE</title>
   <style>
       /* DESIGN ATOMIQUE - NOIR OLED */
       body { 
           margin: 0; 
           background: #000; 
           color: #fff; 
           font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
           height: 100vh; 
           display: flex; 
           flex-direction: column; 
           justify-content: center; 
           align-items: center; 
           overflow: hidden; 
       }

       /* LE SCEAU (Atome) : Tension Géométrique */
       #sceau { 
           width: 100px; 
           height: 100px; 
           position: relative; 
           margin-bottom: 60px; 
           cursor: pointer; 
           transition: transform 1.5s cubic-bezier(0.19, 1, 0.22, 1);
       }

       /* Noyau Central Stable */
       .noyau {
           width: 12px;
           height: 12px;
           background: #fff;
           border-radius: 50%;
           position: absolute;
           top: 50%;
           left: 50%;
           transform: translate(-50%, -50%);
           box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
       }

       /* Électrons en Orbite (Cercles Blanc Cyan Glacé) */
       .electron { 
           width: 5px; 
           height: 5px; 
           background: #e0ffff; /* Blanc Cyan Glacé */
           position: absolute; 
           border-radius: 50%; /* Cercles parfaits */
           box-shadow: 0 0 8px rgba(224, 255, 255, 0.8);
       }

       /* Positionnement des 3 électrons */
       #e1 { top: 0; left: 50%; transform: translateX(-50%); }
       #e2 { bottom: 0; left: 0; }
       #e3 { bottom: 0; right: 0; }

       /* CHAMP D'INTENTION (FLUX) */
       #input-flux { 
           background: transparent; 
           border: none; 
           border-bottom: 1px solid #222; 
           color: #fff; 
           text-align: center; 
           font-size: 1.1rem; 
           outline: none; 
           width: 200px; 
           letter-spacing: 4px; 
           padding: 10px 0;
           text-transform: uppercase;
       }

       #input-flux:focus { 
           border-bottom: 1px solid #fff; 
       }

       /* AFFICHAGE DE RÉSONANCE (Style Scanner) */
       #status { 
           margin-top: 30px; 
           font-size: 0.65rem; 
           letter-spacing: 2px; 
           color: #555; 
           text-transform: uppercase; 
           text-align: center; 
           line-height: 1.8;
           height: 60px;
       }

       .resonance-val { color: #e0ffff; font-weight: bold; }
   </style>
</head>
<body>

   <div id="sceau" onclick="activerScan()">
       <div class="noyau"></div>
       <div class="electron" id="e1"></div>
       <div class="electron" id="e2"></div>
       <div class="electron" id="e3"></div>
   </div>

   <input type="text" id="input-flux" placeholder="INTERÊT" onkeydown="if(event.key==='Enter') activerScan()">

   <div id="status">SYSTÈME PASSIF<br>EN ATTENTE D'ANCRAGE</div>

   <script>
       function activerScan() {
           const val = document.getElementById('input-flux').value;
           if(!val) return;

           const sceau = document.getElementById('sceau');
           const status = document.getElementById('status');

           // Animation du Spin (Rotation Intense pour le Scan)
           sceau.style.transform = 'rotate(1080deg)';
           status.innerHTML = 'SCAN DE RÉSONANCE...<br>RECHERCHE À NANTES';

           if ("geolocation" in navigator) {
               navigator.geolocation.getCurrentPosition(function(position) {
                   const lat = position.coords.latitude;
                   const lon = position.coords.longitude;

                   // Simulation algorithmique de la Collision (Module 2)
                   // Intensité de résonance (5-99%)
                   const intensite = Math.floor(Math.random() * 95) + 5; 
                   // Atomes proches simulés (0-12)
                   const atomesProches = Math.floor(Math.random() * 12);

                   // Latence de calcul simulée (1.2s)
                   setTimeout(() => {
                       let msg = 'RÉSONANCE ACTIVE : <span class="resonance-val">' + intensite + '%</span><br>';

                       if (atomesProches > 0) {
                           msg += '<span class="resonance-val">' + atomesProches + '</span> ATOMES EN COLLISION<br>';
                       } else {
                           msg += 'AUCUN ATOME EN COLLISION PROCHE<br>';
                       }

                       msg += '<small>' + lat.toFixed(3) + ' / ' + lon.toFixed(3) + '</small>';

                       status.innerHTML = msg;
                       sceau.style.transform = 'rotate(0deg)';

                       // Si résonance élevée, on fait pulser le sceau (Module A)
                       if (intensite > 80) {
                           sceau.style.boxShadow = '0 0 20px rgba(224, 255, 255, 0.5)';
                           setTimeout(() => sceau.style.boxShadow = 'none', 1000);
                       }
                   }, 1200);

               }, function(error) {
                   alert("ERREUR D'ANCRAGE : Veuillez autoriser la localisation.");
                   status.innerText = 'ANCRAGE ÉCHOUÉ';
               });
           } else {
               alert("Ancrage GPS non supporté.");
           }
       }
   </script>
</body>
</html>
