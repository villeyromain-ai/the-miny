<!DOCTYPE html>
<html lang="fr">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
   <title>THE MINY - SINGULARITY</title>
   <style>
       :root { --neon: #0FF; --bg: #000; }
       * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
       body, html { margin: 0; padding: 0; background: var(--bg); overflow: hidden; height: 100dvh; font-family: 'Helvetica Neue', sans-serif; }

       canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

       #interface-layer {
           position: relative; z-index: 10; height: 100dvh;
           display: flex; flex-direction: column; justify-content: space-between;
           padding: env(safe-area-inset-top) 25px env(safe-area-inset-bottom) 25px;
       }

       #status { text-align: center; color: var(--neon); font-size: 10px; letter-spacing: 5px; font-weight: 200; padding-top: 20px; opacity: 0.8; }

       #input-container {
           width: 100%; display: flex; flex-direction: column; align-items: center; padding-bottom: 40px;
       }

       .quantum-pill {
           width: 100%; max-width: 400px; height: 60px;
           background: rgba(255,255,255,0.02); border-radius: 30px;
           border: 0.5px solid rgba(0, 255, 255, 0.15);
           backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
           display: flex; align-items: center; padding: 0 25px;
           transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
       }

       .quantum-pill:focus-within { border-color: var(--neon); background: rgba(0, 255, 255, 0.05); transform: translateY(-5px); }

       input {
           background: transparent; border: none; color: #FFF; width: 100%;
           text-align: center; font-size: 13px; letter-spacing: 3px; outline: none;
           text-transform: uppercase; font-weight: 300;
       }

       #geo-data { font-size: 8px; color: var(--neon); opacity: 0.4; margin-top: 20px; letter-spacing: 2px; }
   </style>
</head>
<body>

<canvas id="stage"></canvas>

<div id="interface-layer">
   <div id="status">A-TOM : SYNCHRONISATION</div>
   <div id="input-container">
       <div class="quantum-pill">
           <input type="text" id="atom-flux" placeholder="INJECTER UN INTÉRÊT" autocomplete="off">
       </div>
       <div id="geo-data">LOCATING NANTES...</div>
   </div>
</div>

<script>
const canvas = document.getElementById('stage'), ctx = canvas.getContext('2d');
let w, h, dpr, points = [];

// LE NOYAU EST LE CENTRE DE L'UNIVERS (m)
const nucleus = { x: 0, y: 0, r: 35, label: 'm' };

function resize() {
   dpr = window.devicePixelRatio || 1;
   w = window.innerWidth; h = window.innerHeight;
   canvas.width = w * dpr; canvas.height = h * dpr;
   ctx.scale(dpr, dpr);
}
window.addEventListener('resize', resize); resize();

// INJECTION DE MATIÈRE (INTÉRÊTS)
document.getElementById('atom-flux').addEventListener('keydown', (e) => {
   if(e.key === 'Enter' && e.target.value) {
       points.push({
           x: (Math.random() - 0.5) * 100,
           y: (Math.random() - 0.5) * 100,
           oldX: (Math.random() - 0.5) * 110,
           oldY: (Math.random() - 0.5) * 110,
           label: e.target.value.toUpperCase(),
           mass: 0.95 + Math.random() * 0.05
       });
       e.target.value = '';
   }
});

function update() {
   const cx = w/2, cy = h/2;

   points.forEach(p => {
       // Moteur Verlet (Vélocité naturelle)
       const vx = (p.x - p.oldX) * p.mass;
       const vy = (p.y - p.oldY) * p.mass;
       p.oldX = p.x; p.oldY = p.y;
       p.x += vx; p.y += vy;

       // Attraction gravitationnelle vers m
       const dx = 0 - p.x;
       const dy = 0 - p.y;
       const dist = Math.sqrt(dx*dx + dy*dy);
       const force = (dist - 120) * 0.005; // Distance d'équilibre à 120px

       p.x += (dx/dist) * force;
       p.y += (dy/dist) * force;
   });
}

function render() {
   update();
   ctx.clearRect(0, 0, w, h);
   ctx.save();
   ctx.translate(w/2, h/2);

   // DESSIN DU NOYAU (m)
   ctx.beginPath();
   ctx.strokeStyle = 'rgba(0, 255, 255, 0.4)';
   ctx.lineWidth = 1;
   ctx.arc(0, 0, nucleus.r, 0, Math.PI*2);
   ctx.stroke();

   ctx.fillStyle = '#FFF';
   ctx.font = '200 28px Helvetica';
   ctx.textAlign = 'center';
   ctx.fillText(nucleus.label, 0, 10);

   // DESSIN DES LIAISONS ET ÉLECTRONS
   points.forEach(p => {
       // Ligne de tension géométrique
       ctx.beginPath();
       ctx.strokeStyle = 'rgba(0, 255, 255, 0.08)';
       ctx.moveTo(0, 0);
       ctx.lineTo(p.x, p.y);
       ctx.stroke();

       // Électron (Particule d'intérêt)
       ctx.beginPath();
       ctx.fillStyle = '#0FF';
       ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
       ctx.fill();

       // Label Sémantique
       ctx.fillStyle = 'rgba(255,255,255,0.7)';
       ctx.font = '300 9px Helvetica';
       ctx.letterSpacing = "2px";
       ctx.fillText(p.label, p.x, p.y + 20);
   });

   ctx.restore();
   requestAnimationFrame(render);
}

// GÉO-SCANNER NANTES
navigator.geolocation.watchPosition(pos => {
   document.getElementById('geo-data').innerText = `NANTES : ${pos.coords.latitude.toFixed(4)} | ${pos.coords.longitude.toFixed(4)}`;
   document.getElementById('status').innerText = 'A-TOM : VEILLE ACTIVE';
});

render();
</script>
</body>
</html>
