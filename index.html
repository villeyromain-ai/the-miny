<!DOCTYPE html>
<html lang="fr">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
   <title>The Miny - v18.5 Reactor</title>
   <style>
       body { margin: 0; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; cursor: crosshair; user-select: none; touch-action: none; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
       #instruction { position: absolute; bottom: 80px; color: #fff; font-weight: 200; font-size: 14px; letter-spacing: 3px; opacity: 0; transition: opacity 0.8s; text-align: center; width: 100%; pointer-events: none; z-index: 10; text-transform: uppercase; }
   </style>
</head>
<body>
   <div id="instruction"></div>
   <canvas id="minyCanvas"></canvas>

<script>
/** * CONFIGURATION DU RÉACTEUR (BOMBE 19.5) */
const REACTOR = {
   ghosts: [],
   lastPulse: 0,
   update() {
       let now = Date.now();
       if (now - this.lastPulse > 6000 && this.ghosts.length < 1) {
           this.ghosts.push({ label: "DESIGN", a: Math.random()*Math.PI*2, o: 0, d: 240 });
           this.lastPulse = now;
       }
   }
};

/** * MOTEUR V18.4 */
const canvas = document.getElementById("minyCanvas");
const ctx = canvas.getContext("2d");
const instruction = document.getElementById("instruction");
let width, height, isPressing = false, pressTimer = 0;
let state = "START_M", currentCore = "m", targetCore = "m";
let progress = 0, selectedAngle = 0, showHalo = false, isInitiated = false;

const menus = {
   "m": { electrons: ["n", "y", "i"], angles: [-Math.PI/2, Math.PI/6, 5*Math.PI/6] },
   "i": { electrons: ["-", "-", "-"], angles: [-Math.PI/2, Math.PI/6, 5*Math.PI/6] },
   "y": { electrons: ["-", "-", "-"], angles: [-Math.PI/2, Math.PI/6, 5*Math.PI/6] }
};

function resize() { 
   width = canvas.width = window.innerWidth; 
   height = canvas.height = window.innerHeight; 
}
window.addEventListener("resize", resize); resize();

function updateText(txt, halo = false) {
   instruction.style.opacity = 0;
   setTimeout(() => { instruction.innerHTML = txt; instruction.style.opacity = 1; showHalo = halo; }, 400);
}

/** * INTERACTIONS */
const handleDown = (e) => {
   isPressing = true; pressTimer = 0;
   const t = e.touches ? e.touches[0] : e;
   const mx = t.clientX - width/2, my = t.clientY - height/2;
   const dist = Math.sqrt(mx*mx + my*my);

   // Capture de l'intérêt (M25 Fusion)
   REACTOR.ghosts.forEach((g, i) => {
       const gx = Math.cos(g.a)*g.d, gy = Math.sin(g.a)*g.d;
       if (Math.sqrt((mx-gx)**2 + (my-gy)**2) < 60) {
           REACTOR.ghosts.splice(i, 1);
           if(navigator.vibrate) navigator.vibrate([15, 30]);
       }
   });

   if (state === "IDLE" && dist > 55) {
       if (!isInitiated && currentCore === "m") return;
       menus[currentCore].electrons.forEach((label, i) => {
           const a = menus[currentCore].angles[i], ex = Math.cos(a)*180, ey = Math.sin(a)*180;
           if (Math.sqrt((mx-ex)**2 + (my-ey)**2) < 50) {
               targetCore = label; selectedAngle = a;
               state = (label === "n") ? "SPACE_JUMP" : "NAV_SPIN";
               progress = 0; isPressing = false;
           }
       });
   }
};

const handleUp = (e) => {
   const t = e.changedTouches ? e.changedTouches[0] : e;
   const mx = t.clientX - width/2, my = t.clientY - height/2;
   const d = Math.sqrt(mx*mx + my*my);

   if (isPressing && pressTimer < 0.4) {
       if (state === "IDLE" && currentCore !== "m" && d < 65) {
           targetCore = "m"; selectedAngle = Math.PI; state = "NAV_SPIN"; progress = 0;
       } else if (state === "ATOM_ALIGN" && d < 100) {
           state = "IDLE"; currentCore = "m"; progress = 0; isInitiated = true;
           updateText("the miny, vos intérêts nous (re)connectent");
       } else if (state === "MAP_VIEW" && d < 80) {
           state = "SPACE_RETURN"; progress = 0;
       }
   }
   isPressing = false;
};

window.addEventListener("mousedown", handleDown); window.addEventListener("mouseup", handleUp);
window.addEventListener("touchstart", (e) => { e.preventDefault(); handleDown(e); }, {passive: false});
window.addEventListener("touchend", (e) => { e.preventDefault(); handleUp(e); }, {passive: false});

/** * RENDU */
function drawAtom(x, y, label, radius, isCore, alpha = 1, halo = false) {
   ctx.save(); ctx.translate(x, y); ctx.globalAlpha = alpha;
   if (halo) {
       const p = Math.pow(Math.abs(Math.sin(Date.now() * 0.002)), 2);
       const g = ctx.createRadialGradient(0, 0, radius, 0, 0, radius * (2 + p * 2));
       g.addColorStop(0, "rgba(0, 255, 255, 0.3)"); g.addColorStop(1, "rgba(0, 0, 0, 0)");
       ctx.fillStyle = g; ctx.beginPath(); ctx.arc(0, 0, radius * 6, 0, Math.PI*2); ctx.fill();
   }
   ctx.shadowColor = "#0FF"; ctx.shadowBlur = 10; ctx.strokeStyle = "#FFF"; ctx.lineWidth = 2; ctx.fillStyle = "#000";
   ctx.beginPath(); ctx.arc(0, 0, radius, 0, Math.PI*2); ctx.fill(); ctx.stroke();
   ctx.shadowBlur = 0; ctx.fillStyle = "#FFF"; ctx.font = isCore ? "300 28px Helvetica Neue" : "300 14px Helvetica Neue";
   ctx.textAlign = "center"; ctx.fillText(label, 0, isCore ? 10 : 5);
   ctx.restore();
}

function loop() {
   ctx.clearRect(0, 0, width, height);
   ctx.save(); ctx.translate(width/2, height/2);

   if (isPressing && (state === "IDLE" || state === "MAP_VIEW")) {
       pressTimer += 0.016;
       if (pressTimer > 0.4) {
           const arc = Math.min(1, (pressTimer - 0.4) * 1.5);
           ctx.strokeStyle = "#FFF"; ctx.lineWidth = 3;
           ctx.beginPath(); ctx.arc(0, 0, 52, -Math.PI/2, (-Math.PI/2) + (Math.PI*2*arc)); ctx.stroke();
           if (arc >= 1) { state = "ATOM_SPIN"; progress = 0; isPressing = false; }
       }
   }

   if (state === "START_M") {
       progress += 0.012; drawAtom(0, 0, "m", 40, true, Math.min(1, progress * 2));
       if (progress >= 1) { state = "ECLOSION"; progress = 0; }
   } else if (state === "ECLOSION") {
       progress += 0.02; drawAtom(0, 0, "m", 40, true, 1);
       menus.m.electrons.forEach((l, i) => {
           const a = menus.m.angles[i], d = 180 * Math.min(1, progress);
           drawAtom(Math.cos(a)*d, Math.sin(a)*d, l, 25, false, Math.min(1, progress));
       });
       if (progress >= 1) { state = "IDLE"; updateText("the miny, vos intérêts nous (re)connectent"); }
   } else if (state === "IDLE") {
       const osc = Math.sin(Date.now() * 0.002) * 5;
       menus[currentCore].electrons.forEach((l, i) => {
           drawAtom(Math.cos(menus[currentCore].angles[i])*(180+osc), Math.sin(menus[currentCore].angles[i])*(180+osc), l, 25, false, 1);
       });
       drawAtom(0, 0, currentCore, 40, true, 1, showHalo);

       // GHOST SONAR (M24)
       if (currentCore === "m") {
           REACTOR.update();
           REACTOR.ghosts.forEach(g => {
               if(g.o < 0.4) g.o += 0.01;
               ctx.save(); ctx.globalAlpha = g.o; ctx.strokeStyle = "#0FF"; ctx.setLineDash([2, 4]);
               ctx.beginPath(); ctx.arc(Math.cos(g.a)*g.d, Math.sin(g.a)*g.d, 22, 0, Math.PI*2); ctx.stroke();
               ctx.fillStyle = "#FFF"; ctx.font = "100 10px Helvetica Neue"; ctx.textAlign = "center"; ctx.fillText(g.label, Math.cos(g.a)*g.d, Math.sin(g.a)*g.d + 4);
               ctx.restore();
           });
       }
   } else if (state === "ATOM_SPIN") {
       progress += 0.02; const rot = progress * Math.PI * 4;
       ["A", "-", "T", "O", "m"].forEach((c, i) => drawAtom(Math.cos(rot + (i*Math.PI*2/5))*180*(1-progress), Math.sin(rot + (i*Math.PI*2/5))*180*(1-progress), c, 22, true, 1));
       if (progress >= 1) { state = "ATOM_ALIGN"; progress = 0; updateText("toucher m pour revenir", true); }
   } else if (state === "ATOM_ALIGN") {
       const chars = ["A", "-", "T", "O", "m"];
       chars.forEach((c, i) => drawAtom((i-2)*90 * Math.min(1, progress*1.5), 0, c, 22, true, 1, (i===4)));
       progress += 0.02;
   } else if (state === "NAV_SPIN") {
       progress += 0.045; const t = progress;
       drawAtom(Math.cos(selectedAngle + t*Math.PI*2)*180*(1-t), Math.sin(selectedAngle + t*Math.PI*2)*180*(1-t), targetCore, 25+(15*t), true, 1, true);
       if (progress >= 1) { currentCore = targetCore; state = "IDLE"; progress = 0; updateText("the miny, vos intérêts nous (re)connectent"); }
   } else if (state === "SPACE_JUMP" || state === "SPACE_RETURN" || state === "MAP_VIEW") {
       let p = (state === "SPACE_JUMP") ? progress : (state === "SPACE_RETURN" ? 1-progress : 1);
       let zoom = Math.pow(p, 3) * 50 + 1; ctx.strokeStyle = "rgba(0, 255, 255, 0.2)";
       for(let i = -5; i <= 5; i++) {
           ctx.beginPath(); ctx.moveTo(i*100*zoom, -height); ctx.lineTo(i*100*zoom, height); ctx.stroke();
           ctx.beginPath(); ctx.moveTo(-width, i*100*zoom); ctx.lineTo(width, i*100*zoom); ctx.stroke();
       }
       drawAtom(0, 0, "n", 40, true, 1, true);
       progress += 0.025;
       if (progress >= 1 && state === "SPACE_JUMP") state = "MAP_VIEW";
       if (progress >= 1 && state === "SPACE_RETURN") { state = "IDLE"; currentCore = "m"; progress = 0; }
   }

   ctx.restore(); requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
