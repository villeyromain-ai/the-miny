<!DOCTYPE html>
<html lang="fr">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
   <style>
       body { margin:0; background:#000; overflow:hidden; cursor:none; }
       canvas { display:block; touch-action:none; }
   </style>
</head>
<body>
<canvas id="A-TOM"></canvas>

<script>
/**
* SECTION ALPHA : LE CHASSIS 19.5 (REDLINE)
* Extraction d'entropie pour stabiliser le piano
*/
const REDLINE = {
   entropy: 0,
   async ignite() {
       const data = new Float32Array(1024);
       window.crypto.getRandomValues(data);
       const hash = await crypto.subtle.digest('SHA-256', data);
       this.entropy = new Uint8Array(hash)[0] / 255;
       return true;
   }
};

/**
* SECTION BETA : LA CARROSSERIE 18.4 (MICHEL-ANGE QUANTIQUE)
*/
const canvas = document.getElementById('A-TOM');
const ctx = canvas.getContext('2d');
let w, h, dpr, rotation = 0, lastX = 0, dragging = false;
let bootProgress = 0, active = false;
let electrons = [];

function resize() {
   dpr = window.devicePixelRatio || 1;
   w = window.innerWidth; h = window.innerHeight;
   canvas.width = w * dpr; canvas.height = h * dpr;
   ctx.scale(dpr, dpr);
}
window.addEventListener('resize', resize);
resize();

// INPUT RÉSONANCE
window.addEventListener('keydown', (e) => {
   if(active && e.key !== 'Shift' && e.key !== 'Control') {
       if(e.key === 'Enter') {
           // Vibration haptique réelle
           if(navigator.vibrate) navigator.vibrate(20);
           return;
       }
       // Ajout d'intérêt organique
       electrons.push({
           label: e.key.toUpperCase(),
           angle: Math.random() * Math.PI * 2,
           dist: 85,
           life: 0
       });
   }
});

// SPIN TACTILE
canvas.addEventListener('pointerdown', e => { dragging = true; lastX = e.clientX; });
canvas.addEventListener('pointermove', e => {
   if(dragging) {
       rotation += (e.clientX - lastX) * 0.01;
       lastX = e.clientX;
   }
});
canvas.addEventListener('pointerup', () => dragging = false);

function render() {
   ctx.fillStyle = '#000';
   ctx.fillRect(0, 0, w, h);

   const cx = w/2, cy = h/2;

   if (!active) {
       // --- ANIMATION 18.4 : TENSION GÉOMÉTRIQUE ---
       bootProgress += 0.012;
       ctx.strokeStyle = '#00FFFF';
       ctx.lineWidth = 1;

       const lines = [
           {x: 0, y: -60}, {x: -52, y: 30}, {x: 52, y: 30}
       ];

       lines.forEach(l => {
           ctx.beginPath();
           ctx.moveTo(cx, cy);
           ctx.lineTo(cx + l.x * Math.min(1, bootProgress), cy + l.y * Math.min(1, bootProgress));
           ctx.stroke();
       });

       if (bootProgress >= 1.5) {
           active = true;
           if(navigator.vibrate) navigator.vibrate([10, 50]);
       }
   } else {
       // --- RENDU ATOME RESSERRÉ ---
       ctx.save();
       ctx.translate(cx, cy);
       ctx.rotate(rotation);

       // NOYAU m
       ctx.shadowBlur = 15;
       ctx.shadowColor = '#00FFFF';
       ctx.fillStyle = '#FFF';
       ctx.font = '200 32px Helvetica Neue';
       ctx.textAlign = 'center';
       ctx.fillText('m', 0, 12 + Math.sin(Date.now() * 0.003) * 3);

       // ÉLECTRONS i
       electrons.forEach(el => {
           if(el.life < 1) el.life += 0.05;
           const x = Math.cos(el.angle) * el.dist;
           const y = Math.sin(el.angle) * el.dist;

           // Halo Cyan Glacé
           const grad = ctx.createRadialGradient(x, y, 0, x, y, 15);
           grad.addColorStop(0, `rgba(224, 255, 255, ${el.life * 0.5})`);
           grad.addColorStop(1, 'transparent');
           ctx.fillStyle = grad;
           ctx.beginPath(); ctx.arc(x, y, 15, 0, Math.PI*2); ctx.fill();

           // Particule
           ctx.fillStyle = `rgba(255,255,255,${el.life})`;
           ctx.beginPath(); ctx.arc(x, y, 1.5, 0, Math.PI*2); ctx.fill();
       });

       ctx.restore();
   }

   requestAnimationFrame(render);
}

// LANCEMENT NUCLÉAIRE
REDLINE.ignite().then(() => {
   render();
});
</script>
</body>
</html>
