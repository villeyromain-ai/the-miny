<!DOCTYPE html>
<html lang="fr">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
   <meta name="apple-mobile-web-app-capable" content="yes">
   <style>
       :root { --sat: env(safe-area-inset-top); --sab: env(safe-area-inset-bottom); }
       /* Verrouillage total du viewport */
       body, html { 
           margin: 0; padding: 0; background: #000; overflow: hidden; 
           height: 100%; width: 100%; position: fixed;
           font-family: -apple-system, sans-serif;
       }

       /* LE CANVAS : C'est la base, il ne dépend d'aucun conteneur */
       #stage { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }

       /* L'INTERFACE : Elle flotte par dessus, totalement indépendante */
       #ui {
           position: fixed; inset: 0; z-index: 10;
           display: flex; flex-direction: column;
           padding: calc(var(--sat) + 20px) 20px calc(var(--sab) + 20px) 20px;
           pointer-events: none; box-sizing: border-box;
       }
       #header { text-align: center; color: #0FF; font-size: 10px; letter-spacing: 5px; text-transform: uppercase; font-weight: 300; }
       #footer { margin-top: auto; display: flex; flex-direction: column; align-items: center; }
       #pill { 
           width: 100%; max-width: 400px; background: rgba(255,255,255,0.08); 
           border-radius: 50px; backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.12);
           pointer-events: auto;
       }
       input { 
           background: transparent; border: none; color: #fff; width: 100%; 
           text-align: center; font-size: 16px; outline: none; padding: 18px 0; 
           letter-spacing: 2px; text-transform: uppercase; font-weight: 200;
       }
       #nantes { font-size: 7px; color: rgba(0,255,255,0.3); margin-top: 15px; letter-spacing: 2px; }

       #boot { position: fixed; inset: 0; z-index: 100; background: #000; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #444; font-size: 10px; letter-spacing: 5px; }
   </style>
</head>
<body>

<div id="boot" onclick="this.style.display='none'">STABILISER LE SYSTÈME</div>

<canvas id="stage"></canvas>

<div id="ui">
   <div id="header">A-TOM : VEILLE</div>
   <div id="footer">
       <div id="pill"><input type="text" id="inp" placeholder="FLUX D'INTÉRÊT" autocomplete="off"></div>
       <div id="nantes">NANTES : 47.349 / -1.541</div>
   </div>
</div>

<script>
const stage = document.getElementById('stage'), ctx = stage.getContext('2d');
const inp = document.getElementById('inp');
let w, h, ratio, atoms = [];

function sync() {
   ratio = window.devicePixelRatio || 1;
   // On utilise visualViewport pour contrer les bugs de Safari
   w = window.visualViewport ? window.visualViewport.width : window.innerWidth;
   h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
   stage.width = w * ratio; stage.height = h * ratio;
   ctx.scale(ratio, ratio);
}

window.addEventListener('resize', sync);
if(window.visualViewport) window.visualViewport.addEventListener('resize', sync);
sync();

inp.addEventListener('keydown', (e) => {
   if(e.key === 'Enter' && inp.value) {
       atoms.push({ label: inp.value, angle: Math.random()*6, d: 200, targetD: 85 });
       inp.value = '';
   }
});

function draw() {
   ctx.clearRect(0, 0, w, h);

   // CENTRE ABSOLU DU VIEWPORT VISIBLE
   // Quoi qu'il arrive, on tape au milieu du canvas
   const cx = w / 2;
   const cy = h / 2;

   ctx.save();
   ctx.translate(cx, cy);

   // NOYAU
   ctx.strokeStyle = 'rgba(0, 255, 255, 0.4)';
   ctx.lineWidth = 1;
   ctx.beginPath(); ctx.arc(0, 0, 26, 0, Math.PI*2); ctx.stroke();
   ctx.fillStyle = '#FFF'; ctx.font = '200 20px Helvetica'; ctx.textAlign = 'center';
   ctx.fillText('m', 0, 7);

   // ORBITES
   atoms.forEach(at => {
       at.angle += 0.01;
       at.d += (at.targetD - at.d) * 0.1;
       const x = Math.cos(at.angle) * at.d;
       const y = Math.sin(at.angle) * at.d;

       ctx.strokeStyle = '#0FF';
       ctx.beginPath(); ctx.arc(x, y, 10, 0, Math.PI*2); ctx.stroke();
       ctx.fillStyle = '#FFF'; ctx.font = '300 9px Helvetica';
       ctx.fillText(at.label.toUpperCase(), x, y + 25);
   });

   ctx.restore();
   requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
