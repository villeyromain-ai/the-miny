<!DOCTYPE html>
<html lang="fr">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
   <meta name="apple-mobile-web-app-capable" content="yes">
   <style>
       :root { --glace: #E0FFFF; --neon: #00FFFF; --deep: #000505; }
       body, html { margin:0; padding:0; background: var(--deep); overflow:hidden; height:100dvh; width:100vw; position:fixed; font-family: 'Courier New', monospace; }

       canvas { position: absolute; inset:0; z-index: 1; pointer-events: none; }

       #proxy-ui {
           position: absolute; inset: 0; z-index: 10; pointer-events: none;
           display: flex; flex-direction: column;
           padding: env(safe-area-inset-top) 30px env(safe-area-inset-bottom) 30px;
       }

       #header-quantum { flex: 0 0 100px; display: flex; align-items: center; justify-content: center; color: var(--neon); font-size: 8px; letter-spacing: 8px; font-weight: 100; text-transform: uppercase; }
       #main-void { flex: 1; }
       #footer-flux { flex: 0 0 150px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; }

       .input-wrapper {
           width: 100%; max-width: 450px; position: relative;
           background: rgba(255,255,255,0.01); border-radius: 2px;
           border-bottom: 1px solid rgba(0, 255, 255, 0.2);
           pointer-events: auto;
       }
       input {
           background: transparent; border: none; color: #fff; width: 100%;
           text-align: center; font-size: 14px; outline: none; padding: 15px 0;
           letter-spacing: 5px; text-transform: uppercase; font-weight: 100;
       }
       #geo-sync { font-size: 6px; color: var(--neon); opacity: 0.4; letter-spacing: 3px; }

       /* Effet de scan glitché */
       .scanline { position: fixed; top: 0; left: 0; width: 100%; height: 2px; background: rgba(0,255,255,0.03); z-index: 5; animation: scan 8s linear infinite; }
       @keyframes scan { from { top: -10%; } to { top: 110%; } }
   </style>
</head>
<body>

<div class="scanline"></div>
<canvas id="quantum-core"></canvas>

<div id="proxy-ui">
   <div id="header-quantum">CORE.A-TOM.STABLE</div>
   <div id="main-void"></div>
   <div id="footer-flux">
       <div class="input-wrapper"><input type="text" id="flux-in" placeholder="INJECT.DATA" autocomplete="off"></div>
       <div id="geo-sync">NANTES.GRID.SYNCING...</div>
   </div>
</div>

<script>
const canvas = document.getElementById('quantum-core'), ctx = canvas.getContext('2d');
const input = document.getElementById('flux-in'), geo = document.getElementById('geo-sync');
let w, h, dpr, particles = [], waves = [];

function setup() {
   dpr = window.devicePixelRatio || 1;
   w = window.innerWidth; h = window.innerHeight;
   canvas.width = w * dpr; canvas.height = h * dpr;
   ctx.scale(dpr, dpr);
}
window.addEventListener('resize', setup); setup();

input.addEventListener('keydown', (e) => {
   if(e.key === 'Enter' && input.value) {
       // Injection de particule avec "spin" quantique
       particles.push({
           t: input.value.toUpperCase(),
           orbit: 100 + Math.random() * 50,
           angle: Math.random() * Math.PI * 2,
           speed: (Math.random() - 0.5) * 0.02,
           entropy: Math.random() * 100,
           life: 1.0
       });
       waves.push({ r: 0, a: 1.0 });
       input.value = '';
   }
});

function drawQuantum() {
   ctx.fillStyle = 'rgba(0, 5, 5, 0.15)'; // Persistance rétinienne (Motion Blur)
   ctx.fillRect(0, 0, w, h);

   const cx = w/2, cy = h/2;

   // 1. LES ONDES DE CHOC (Dilation du vide)
   waves.forEach((wve, i) => {
       ctx.beginPath();
       ctx.arc(cx, cy, wve.r, 0, Math.PI*2);
       ctx.strokeStyle = `rgba(0, 255, 255, ${wve.a * 0.2})`;
       ctx.lineWidth = 0.5;
       ctx.stroke();
       wve.r += 6; wve.a -= 0.01;
       if(wve.a <= 0) waves.splice(i, 1);
   });

   ctx.save();
   ctx.translate(cx, cy);

   // 2. LE NOYAU "m" (Sceau de Fondation)
   // On dessine le m non pas comme du texte, mais comme une résonance
   ctx.shadowBlur = 15; ctx.shadowColor = "#0FF";
   ctx.fillStyle = "#FFF"; ctx.font = "200 24px Helvetica"; ctx.textAlign="center";
   ctx.fillText("m", Math.random()-0.5, 8 + (Math.random()-0.5)); // Micro-vibration
   ctx.shadowBlur = 0;

   // 3. NUAGES DE PROBABILITÉ (Électrons)
   particles.forEach(p => {
       p.angle += p.speed;
       p.entropy += 0.1;

       // Calcul de la position avec incertitude
       const noise = Math.sin(p.entropy) * 3;
       const x = Math.cos(p.angle) * p.orbit + noise;
       const y = Math.sin(p.angle) * p.orbit + noise;

       // Halo Glacé (L'aura)
       const g = ctx.createRadialGradient(x, y, 0, x, y, 20);
       g.addColorStop(0, 'rgba(224, 255, 255, 0.3)');
       g.addColorStop(1, 'rgba(0, 255, 255, 0)');
       ctx.fillStyle = g;
       ctx.beginPath(); ctx.arc(x, y, 20, 0, Math.PI*2); ctx.fill();

       // Point de Singularité
       ctx.fillStyle = "#FFF";
       ctx.beginPath(); ctx.arc(x, y, 1.5, 0, Math.PI*2); ctx.fill();

       // Texte projeté (Sémantique)
       ctx.fillStyle = "rgba(255, 255, 255, 0.6)";
       ctx.font = "100 8px Courier New";
       ctx.fillText(p.t, x, y + 25);

       // Liaison Laser instable
       ctx.beginPath();
       ctx.strokeStyle = "rgba(0, 255, 255, 0.05)";
       ctx.moveTo(0,0); ctx.lineTo(x,y); ctx.stroke();
   });

   ctx.restore();
   requestAnimationFrame(drawQuantum);
}

// DATA FEED NANTES
navigator.geolocation.watchPosition(pos => {
   geo.innerText = `NANTES.LAT.${pos.coords.latitude.toFixed(4)}.LONG.${pos.coords.longitude.toFixed(4)}.SYNC`;
});

drawQuantum();
</script>
</body>
</html>
