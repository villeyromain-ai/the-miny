<!DOCTYPE html>
<html lang="fr">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
   <meta name="apple-mobile-web-app-capable" content="yes">
   <style>
       :root { --neon: #0FF; --glass: rgba(255, 255, 255, 0.03); }
       body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100dvh; width: 100vw; position: fixed; font-family: "Helvetica Neue", sans-serif; }

       canvas { position: absolute; inset: 0; z-index: 1; filter: contrast(1.2) brightness(1.1); }

       #the-miny-core {
           position: absolute; inset: 0; z-index: 10;
           display: flex; flex-direction: column; justify-content: space-between;
           padding: env(safe-area-inset-top) 30px env(safe-area-inset-bottom) 30px;
           pointer-events: none; box-sizing: border-box;
       }

       header { padding-top: 20px; text-align: center; color: var(--neon); font-size: 10px; letter-spacing: 7px; font-weight: 200; opacity: 0.6; animation: pulse 4s infinite; }

       footer { padding-bottom: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; }

       #input-zone {
           width: 100%; max-width: 500px; height: 64px;
           background: var(--glass); border-radius: 32px;
           backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
           border: 0.5px solid rgba(0, 255, 255, 0.2);
           display: flex; align-items: center; pointer-events: auto;
           transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
       }
       #input-zone:focus-within { background: rgba(0, 255, 255, 0.05); border-color: var(--neon); box-shadow: 0 0 30px rgba(0, 255, 255, 0.1); }

       input {
           background: transparent; border: none; color: #FFF; width: 100%;
           text-align: center; font-size: 14px; letter-spacing: 4px; outline: none;
           text-transform: uppercase; font-weight: 200;
       }

       #coordinates { font-size: 7px; color: var(--neon); opacity: 0.3; letter-spacing: 3px; }

       @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } }
   </style>
</head>
<body>

<canvas id="singularity"></canvas>

<div id="the-miny-core">
   <header>A-TOM : CONNECTÉ</header>
   <footer>
       <div id="input-zone"><input type="text" id="flux" placeholder="NOUVEL INTÉRÊT" autocomplete="off"></div>
       <div id="coordinates">SCANNING...</div>
   </footer>
</div>

<script>
const canvas = document.getElementById('singularity'), ctx = canvas.getContext('2d');
let w, h, dpr, particles = [];

// STRUCTURE ATOMIQUE DE RÉFÉRENCE
const nucleus = { x: 0, y: 0, size: 28, label: 'm' };

function resize() {
   dpr = window.devicePixelRatio || 1;
   w = window.innerWidth; h = window.innerHeight;
   canvas.width = w * dpr; canvas.height = h * dpr;
   ctx.scale(dpr, dpr);
}
window.addEventListener('resize', resize); resize();

document.getElementById('flux').addEventListener('keydown', (e) => {
   if(e.key === 'Enter' && e.target.value) {
       particles.push({
           text: e.target.value,
           angle: Math.random() * Math.PI * 2,
           distance: 300,
           targetDist: 90 + (Math.random() * 40),
           speed: 0.005 + (Math.random() * 0.01),
           osc: Math.random() * 10,
           seed: Math.random()
       });
       e.target.value = '';
   }
});

function draw() {
   ctx.fillStyle = '#000';
   ctx.fillRect(0, 0, w, h);

   const cx = w / 2;
   const cy = h / 2;

   ctx.save();
   ctx.translate(cx, cy);

   // DESSIN DU NOYAU M (Standard v17.2)
   ctx.beginPath();
   ctx.strokeStyle = 'rgba(0, 255, 255, 0.4)';
   ctx.lineWidth = 1.5;
   ctx.arc(0, 0, nucleus.size, 0, Math.PI * 2);
   ctx.stroke();

   ctx.fillStyle = '#FFF';
   ctx.font = '200 24px Helvetica';
   ctx.textAlign = 'center';
   ctx.fillText(nucleus.label, 0, 9);

   // LES ÉLECTRONS QUANTIQUES
   particles.forEach((p, i) => {
       p.angle += p.speed;
       p.distance += (p.targetDist - p.distance) * 0.05;

       // Effet de flottement organique
       const drift = Math.sin(Date.now() * 0.002 + p.osc) * 5;
       const x = Math.cos(p.angle) * (p.distance + drift);
       const y = Math.sin(p.angle) * (p.distance + drift);

       // Ligne de tension géométrique
       ctx.beginPath();
       ctx.strokeStyle = 'rgba(0, 255, 255, 0.1)';
       ctx.moveTo(0, 0);
       ctx.lineTo(x, y);
       ctx.stroke();

       // Électron
       ctx.beginPath();
       ctx.fillStyle = '#0FF';
       ctx.arc(x, y, 4, 0, Math.PI * 2);
       ctx.fill();

       // Label
       ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
       ctx.font = '300 9px Helvetica';
       ctx.letterSpacing = "2px";
       ctx.fillText(p.text.toUpperCase(), x, y + 22);
   });

   ctx.restore();
   requestAnimationFrame(draw);
}

// LOCALISATION TEMPS RÉEL
navigator.geolocation.watchPosition(p => {
   document.getElementById('coordinates').innerText = `NANTES : ${p.coords.latitude.toFixed(3)} / ${p.coords.longitude.toFixed(3)}`;
});

draw();
</script>
</body>
</html>
