<!DOCTYPE html>
<html lang="fr">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
   <style>
       :root { --ice: #E0FFFF; --cyan: #00FFFF; --void: #000000; }
       body, html { margin:0; padding:0; background: var(--void); overflow:hidden; height:100dvh; width:100vw; position:fixed; }
       canvas { position: absolute; inset:0; z-index: 1; touch-action: none; }
       #ui { position: absolute; inset:0; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px; }
       input { pointer-events: auto; background: transparent; border: none; color: #fff; width: 100%; text-align: center; font-size: 12px; outline: none; letter-spacing: 5px; text-transform: uppercase; font-weight: 100; padding: 20px 0; }
       .loc { color: var(--cyan); font-size: 7px; text-align: center; opacity: 0.4; letter-spacing: 3px; margin-bottom: 10px; }
   </style>
</head>
<body>

<canvas id="stage"></canvas>
<div id="ui">
   <div style="height:50px"></div>
   <div>
       <div class="loc" id="nantes">SCANNING...</div>
       <input type="text" id="flux" placeholder="INJECTER RÉSONANCE" autocomplete="off">
   </div>
</div>

<script>
const canvas = document.getElementById('stage'), ctx = canvas.getContext('2d');
let w, h, dpr, electrons = [], pulses = [], rotation = 0, isDragging = false, lastX = 0;

// --- MODULE 1: NUCLEUS & SYNC ---
function sync() {
   dpr = window.devicePixelRatio || 1;
   w = window.innerWidth; h = window.innerHeight;
   canvas.width = w * dpr; canvas.height = h * dpr;
   ctx.scale(dpr, dpr);
}
window.addEventListener('resize', sync); sync();

// --- MODULE 2: KINETICS (Touch-to-Spin) ---
canvas.addEventListener('pointerdown', e => { isDragging = true; lastX = e.clientX; });
window.addEventListener('pointermove', e => {
   if (isDragging) {
       let delta = e.clientX - lastX;
       rotation += delta * 0.01; // Le spin est possible que par le toucher
       lastX = e.clientX;
   }
});
window.addEventListener('pointerup', () => isDragging = false);

// --- MODULE 3: SEMANTIC (Electron Integration) ---
document.getElementById('flux').addEventListener('keydown', e => {
   if(e.key === 'Enter' && e.target.value) {
       electrons.push({
           label: e.target.value.toUpperCase(),
           angle: Math.random() * Math.PI * 2 - rotation,
           dist: 85, // Atome resserré
           pulseState: 0
       });
       // Lancement pulsations et halo cyan glacé
       pulses.push({ r: 40, a: 1.0 }); 
       e.target.value = '';
   }
});

// --- MODULE 4: PHOTONIC ENGINE ---
function render() {
   ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; // Persistance quantique
   ctx.fillRect(0, 0, w, h);
   const cx = w/2, cy = h/2;

   // Pulsations de connexion
   pulses.forEach((p, i) => {
       ctx.beginPath();
       ctx.arc(cx, cy, p.r, 0, Math.PI*2);
       ctx.strokeStyle = `rgba(0, 255, 255, ${p.a})`;
       ctx.lineWidth = 0.5;
       ctx.stroke();
       p.r += 6; p.a -= 0.02;
       if(p.a <= 0) pulses.splice(i, 1);
   });

   ctx.save();
   ctx.translate(cx, cy);
   ctx.rotate(rotation);

   // Noyau 'm'
   ctx.shadowBlur = 15; ctx.shadowColor = "cyan";
   ctx.fillStyle = "#fff"; ctx.font = "200 24px Helvetica"; ctx.textAlign="center";
   ctx.fillText("m", 0, 8);
   ctx.shadowBlur = 0;

   // Électrons (Boussoles célestes)
   electrons.forEach(el => {
       const x = Math.cos(el.angle) * el.dist;
       const y = Math.sin(el.angle) * el.dist;

       // Halo blanc cyan glacé constant
       const grad = ctx.createRadialGradient(x, y, 0, x, y, 15);
       grad.addColorStop(0, 'rgba(224, 255, 255, 0.4)');
       grad.addColorStop(1, 'rgba(0, 255, 255, 0)');
       ctx.fillStyle = grad;
       ctx.beginPath(); ctx.arc(x, y, 15, 0, Math.PI*2); ctx.fill();

       // Point de matière
       ctx.fillStyle = "#fff";
       ctx.beginPath(); ctx.arc(x, y, 1.5, 0, Math.PI*2); ctx.fill();

       // Label
       ctx.fillStyle = "rgba(255,255,255,0.5)";
       ctx.font = "100 8px Helvetica";
       ctx.fillText(el.label, x, y + 20);
   });

   ctx.restore();
   requestAnimationFrame(render);
}

navigator.geolocation.watchPosition(p => {
   document.getElementById('nantes').innerText = `NANTES : ${p.coords.latitude.toFixed(3)} / ${p.coords.longitude.toFixed(3)}`;
});

render();
</script>
</body>
</html>
