<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>the miny</title>
<style>
  :root { --sat: env(safe-area-inset-top); --sab: env(safe-area-inset-bottom); }
  body, html { 
      margin: 0; padding: 0; background: #000; overflow: hidden; 
      height: 100dvh; width: 100vw; position: fixed;
      font-family: -apple-system, sans-serif; color: #fff;
  }

  canvas { position: absolute; inset: 0; z-index: 1; }

  #app-interface {
      position: relative; z-index: 10;
      height: 100dvh; width: 100vw;
      display: flex; flex-direction: column;
      padding: calc(var(--sat) + 10px) 25px calc(var(--sab) + 10px) 25px;
      box-sizing: border-box; pointer-events: none;
  }

  #status-bar { flex: 0 0 30px; text-align: center; }
  #atom-msg { font-size: 9px; letter-spacing: 5px; color: #0FF; text-transform: uppercase; font-weight: 200; }

  #viewport-center { flex: 1; display: flex; align-items: center; justify-content: center; }

  #input-zone { flex: 0 0 80px; pointer-events: auto; display: flex; align-items: center; }
  #pill-container { 
      background: rgba(255,255,255,0.06); border-radius: 50px; 
      backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); width: 100%;
  }
  input { 
      background: transparent; border: none; color: #fff; width: 100%; 
      text-align: center; font-size: 14px; outline: none; padding: 15px 0; 
      letter-spacing: 3px; font-weight: 200; text-transform: uppercase; 
  }

  #gate { 
      position: fixed; inset: 0; z-index: 100; background: #000; 
      display: flex; align-items: center; justify-content: center;
  }
  .start-btn { border: 1px solid #333; padding: 12px 25px; border-radius: 40px; font-size: 8px; letter-spacing: 4px; color: #666; }
</style>
</head>
<body>

<div id="gate" onclick="init()">
   <div class="start-btn">ALIGNER LE CENTRE</div>
</div>

<div id="app-interface">
   <div id="status-bar"><div id="atom-msg">INITIALISATION</div></div>
   <div id="viewport-center">
       </div>
   <div id="input-zone">
       <div id="pill-container"><input type="text" id="flow-in" placeholder="FLUX D'INTÉRÊT" autocomplete="off"></div>
   </div>
</div>

<canvas id="world"></canvas>

<script>
const world = document.getElementById("world"), ctx = world.getContext("2d");
const msg = document.getElementById("atom-msg"), flowIn = document.getElementById("flow-in");
const centerZone = document.getElementById("viewport-center");

let w, h, ratio, cSize, atoms = [], collisions = [], loc = "NANTES : SCAN...";

function init() {
   document.getElementById("gate").style.display = "none";
   msg.innerText = "A-TOm : CENTRE VERROUILLÉ";
   navigator.geolocation.getCurrentPosition(p => {
       loc = `NANTES : ${p.coords.latitude.toFixed(3)} / ${p.coords.longitude.toFixed(3)}`;
   });
}

function resize() {
   ratio = window.devicePixelRatio || 1;
   w = window.innerWidth; h = window.innerHeight;
   world.width = w * ratio; world.height = h * ratio;
   ctx.scale(ratio, ratio);
   cSize = Math.min(w, h) * 0.14;
}
window.addEventListener("resize", resize); resize();

flowIn.addEventListener("keydown", (e) => {
   if(e.key === "Enter" && flowIn.value) {
       atoms.push({ l: flowIn.value, a: Math.random()*6, d: 300, td: 90, c: "#0FF" });
       msg.innerText = "FLUX CAPTÉ";
       flowIn.value = "";
       setTimeout(() => {
           collisions.push({ l: "PROXIMITÉ", a: Math.random()*6, d: 400, td: 160, c: "#FFF", txt: "RÉSONANCE" });
           msg.innerText = "COLLISION DÉTECTÉE";
       }, 1200);
   }
});

function draw() {
   ctx.clearRect(0, 0, w, h);

   // CALCUL DU CENTRE RÉEL BASÉ SUR LA DIV VIEWPORT-CENTER
   const rect = centerZone.getBoundingClientRect();
   const cx = rect.left + rect.width / 2;
   const cy = rect.top + rect.height / 2;

   ctx.save(); ctx.translate(cx, cy);
   const time = Date.now() * 0.002;

   // NOYAU
   ctx.strokeStyle = "rgba(0,255,255,0.3)";
   ctx.beginPath(); ctx.arc(0, 0, cSize/2, 0, Math.PI*2); ctx.stroke();
   ctx.fillStyle = "#fff"; ctx.font = "100 18px Helvetica"; ctx.textAlign="center";
   ctx.fillText("m", 0, 7);

   // ÉLÉMENTS
   [atoms, collisions].forEach((g, idx) => {
       g.forEach(at => {
           at.a += (idx === 0 ? 0.005 : -0.002);
           at.d += (at.td - at.d) * 0.05;
           const x = Math.cos(at.a)*at.d, y = Math.sin(at.a)*at.d;
           ctx.strokeStyle = at.c; ctx.globalAlpha = (idx === 0 ? 1 : 0.4);
           ctx.beginPath(); ctx.arc(x, y, 12, 0, Math.PI*2); ctx.stroke();
           ctx.fillStyle = "#fff"; ctx.font = "8px Helvetica";
           ctx.fillText(at.l.toUpperCase(), x, y + 24);
           if(idx === 1 && at.d < 180) {
               ctx.fillStyle = "#0FF"; ctx.fillText(at.txt, x, y - 18);
           }
       });
   });
   ctx.restore();

   // LOCALISATION
   ctx.globalAlpha = 0.15; ctx.fillStyle = "#fff"; ctx.font = "7px Helvetica"; ctx.textAlign="center";
   ctx.fillText(loc, w/2, rect.bottom + 20);

   requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
